<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sailor and Bupa: Go to the Beach</title>
  <style>
    /* Premium visual styling and reset */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background-color: #1a1c1e;
      color: #e2e2e6;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    #game-container {
      position: relative;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      border-radius: 12px;
      overflow: hidden;
      border: 4px solid #3c3f41;
      background-color: #2b2d2f;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    .hud {
      position: absolute;
      top: 16px;
      left: 16px;
      pointer-events: none;
      background: rgba(26, 28, 30, 0.85);
      backdrop-filter: blur(4px);
      padding: 12px 18px;
      border-radius: 8px;
      border: 2px solid #5a5d60;
      color: #f4edd2;
      font-size: 14px;
      line-height: 1.5;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    .hud-title {
      font-weight: bold;
      color: #e3a857;
      margin-bottom: 6px;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 1px;
    }
    .hud-line {
      display: flex;
      justify-content: space-between;
      gap: 20px;
    }
    .debug-panel {
      position: absolute;
      bottom: 16px;
      left: 16px;
      pointer-events: none;
      background: rgba(26, 28, 30, 0.7);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 11px;
      color: #8c9094;
      border: 1px solid #444;
    }
    .restart-hint {
      /* Same frame treatment as .hud (border radius, border width/color,
         background) so the two player-facing chips read as one family. */
      position: absolute;
      bottom: 16px;
      right: 16px;
      background: rgba(26, 28, 30, 0.85);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12px;
      color: #e3a857;
      border: 2px solid #5a5d60;
    }
    /* Overlay for End of Game and Start Screen */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(18, 20, 22, 0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #f4edd2;
      padding: 40px;
      text-align: center;
      transition: opacity 0.3s ease;
    }
    .overlay.hidden {
      display: none;
    }
    .overlay h1 {
      font-size: 28px;
      color: #e3a857;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .overlay p {
      font-size: 16px;
      margin-bottom: 24px;
      line-height: 1.6;
      max-width: 500px;
    }
    .btn {
      background-color: #e3a857;
      color: #1a1c1e;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      font-family: inherit;
      font-weight: bold;
      cursor: pointer;
      border-radius: 6px;
      box-shadow: 0 4px 10px rgba(227, 168, 87, 0.3);
      transition: all 0.2s;
    }
    .btn:hover {
      background-color: #f1be7a;
      transform: translateY(-2px);
    }
    .btn:active {
      transform: translateY(0);
    }
    .results-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 30px;
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 8px;
      border: 1px solid #444;
      width: 100%;
      max-width: 400px;
    }
    .result-val {
      font-size: 20px;
      font-weight: bold;
      color: #e3a857;
    }
  </style>
</head>
<body>

<div id="game-container">
  <canvas id="gameCanvas" width="800" height="600"></canvas>
  
  <!-- HUD display -->
  <div class="hud">
    <div class="hud-title">Beach Walk</div>
    <div class="hud-line"><span>Shells Collected:</span><span id="score-collected" style="color: #e3a857; font-weight: bold;">0</span></div>
    <div class="hud-line"><span>Shells Missed:</span><span id="score-missed" style="color: #c95c5c;">0</span></div>
  </div>

  <!-- Debug info -->
  <div class="debug-panel" id="debug-panel">
    Bupa state: -- | Dist: --
  </div>

  <!-- Restart cue -->
  <div class="restart-hint">
    Press [R] to Restart
  </div>

  <!-- End Game Overlay -->
  <div id="end-overlay" class="overlay hidden">
    <h1 id="end-title">Beach Walk Complete</h1>
    <p id="end-message">Bupa has finished investigating the beach! You stayed by his side and walked together.</p>
    <div class="results-grid">
      <div>
        <div style="font-size: 12px; color: #8c9094; text-transform: uppercase;">Collected</div>
        <div class="result-val" id="final-collected">0</div>
      </div>
      <div>
        <div style="font-size: 12px; color: #8c9094; text-transform: uppercase;">Forfeited</div>
        <div class="result-val" id="final-missed">0</div>
      </div>
    </div>
    <button class="btn" onclick="resetGame()">Walk Again</button>
  </div>
</div>

<script>
  // --- CONFIGURABLE CONSTANTS (Exposed at the top for easy tuning) ---
  const CONFIG = {
    SAILOR_SPEED: 180,           // Sailor movement speed (pixels/sec)
    BUPA_TROTTING_SPEED: 75,     // Bupa standard walk speed (pixels/sec)
    COMFORT_RADIUS: 240,         // Distance Sailor can stray before Bupa sits & waits
    REASSURE_RADIUS: 140,        // Distance Sailor must return to for Bupa to resume trotting
    
    // Pause duration configurations per interest point type (min duration, max duration)
    PAUSE_DURATIONS: {
      rock: { min: 2.0, max: 4.0 },       // Short pause
      driftwood: { min: 4.5, max: 6.5 },   // Medium pause
      tidepool: { min: 8.0, max: 11.0 },   // Long pause (occasional only)
      beachball: { min: 4.0, max: 6.0 },   // Medium pause - batting beat
      umbrella: { min: 5.0, max: 7.5 }     // Medium-long pause - shade sit
    },

    // Camera follow speed interpolation coefficient
    CAMERA_LERP: 0.08,
    
    // Total number of interest point stops Bupa will make
    TOTAL_STOPS: 10
  };

  const canvas = document.getElementById('gameCanvas');
  const displayCtx = canvas.getContext('2d');

  // All game-world drawing happens on this half-resolution offscreen buffer,
  // then gets blitted up with nearest-neighbor scaling. Rendering everything
  // through one shared low-res buffer is what keeps sand, water, shells,
  // Sailor and Bupa on a single consistent pixel scale instead of looking
  // like smooth canvas primitives with pixel details bolted on.
  const PIXEL_SCALE = 0.5;
  const pixelCanvas = document.createElement('canvas');
  pixelCanvas.width = canvas.width * PIXEL_SCALE;
  pixelCanvas.height = canvas.height * PIXEL_SCALE;
  const ctx = pixelCanvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  displayCtx.imageSmoothingEnabled = false;

  // Input system
  const keys = {};
  let gpButton0WasDown = false;
  window.addEventListener('keydown', (e) => {
    keys[e.code] = true;
    if (e.code === 'KeyR') {
      resetGame();
    }
  });
  window.addEventListener('keyup', (e) => {
    keys[e.code] = false;
  });

  // Game state variables
  let sailor = { x: 400, y: 400, vx: 0, vy: 0, width: 22, height: 32, facingLeft: false, isMoving: false };
  let bupa = { 
    x: 400, 
    y: 480, 
    vx: 0, 
    vy: 0, 
    width: 20, 
    height: 14, 
    state: 'TROTTING', // TROTTING, INVESTIGATING, CHECK_BACK
    currentTargetIdx: 0,
    pauseTimer: 0,
    pauseDuration: 0,
    facingLeft: false,
    meowTimer: 0,
    stateProgress: 0, // 0.0 to 1.0 within INVESTIGATING state
    reunionTimer: 0,
    sailorNearStillTimer: 0
  };

  let cameraY = 150; // offset
  let shellsCollected = 0;
  let shellsMissed = 0;
  let interestPoints = [];
  let shells = [];
  let particles = [];
  let crabs = [];
  let crabSpawnTimer = 20;
  let shellSparkleTimer = 1;
  let isGameOver = false;

  // --- PALETTE (visual redesign direction brief, Direction A slice) ---
  // A narrow set of warm base hues shared across sand, dune, water, wood,
  // stone, grass and both characters, so every fill is drawn from one
  // "sunny afternoon" family instead of independently-chosen hex values.
  // shadeColor() (below) derives a shadow and highlight tone from each base
  // at draw time, giving every object the same base/shadow/highlight
  // 3-tone treatment without inventing per-object hex values.
  const PALETTE = {
    sand: '#f3d6a1',
    sandGrain: '#d1a06b',
    dune: '#e0bb80',
    duneGrain: '#bb8f56',
    water: '#2a92a0',
    wood: '#8a5c38',
    stone: '#79705c',
    grass: '#94c25a',
    tidepool: '#2695ab',
    coral: '#e2604f',
    gold: '#f0bd4a',
    hair: '#7a4a2a',
    outfit: '#3a7cb5',
    bupaFur: '#87847a'
  };

  // Initialize interest point configurations & types
  const INTEREST_POINT_TYPES = [
    { type: 'rock', color: '#7a7d80', label: 'Rock Pile' },
    { type: 'driftwood', color: '#9c6f44', label: 'Driftwood' },
    { type: 'tidepool', color: '#4d8dbf', label: 'Tidepool' },
    { type: 'beachball', color: '#e85a4f', label: 'Beach Ball' },
    { type: 'umbrella', color: '#e85a4f', label: 'Umbrella' }
  ];

  // Shell colors kept clear of the dry-sand tone (#f0e3c5) so shells stay
  // visible at a glance instead of blending into the ground.
  const SHELL_COLORS = ['#e8a9a0', '#c9b8d9', '#fdf7ec', '#e8a028', '#8fb9c9'];

  function generateLevel() {
    interestPoints = [];
    shells = [];
    particles = [];
    
    // Spawn starting interest point at starting Y
    let currentY = 320;
    
    // Generate 10 interest points scaling upward (decreasing Y)
    for (let i = 0; i < CONFIG.TOTAL_STOPS; i++) {
      currentY -= 350 + Math.random() * 100;
      // Keep x within sandy beach boundaries (between X=280 and X=600)
      let x = 280 + Math.random() * 260;
      
      // Common rotation cycles through rock, driftwood, beachball, umbrella.
      // Tidepool is retired as the default common POI (per playtest 0011) and
      // now appears only occasionally, never on the first stop.
      let typeData;
      const r = Math.random();
      if (i % 4 === 0) {
        typeData = INTEREST_POINT_TYPES[0]; // rock
      } else if (i % 4 === 1) {
        typeData = INTEREST_POINT_TYPES[1]; // driftwood
      } else if (i % 4 === 2) {
        typeData = INTEREST_POINT_TYPES[3]; // beachball
      } else {
        typeData = INTEREST_POINT_TYPES[4]; // umbrella
      }
      // Occasional tidepool (~15% of stops after the first), kept as a
      // rare ocean-adjacent feature rather than the default common object.
      if (i > 0 && r < 0.15) {
        typeData = INTEREST_POINT_TYPES[2]; // tidepool
      }
      
      interestPoints.push({
        x: x,
        y: currentY,
        type: typeData.type,
        color: typeData.color,
        label: typeData.label,
        visited: false
      });

      // Spawn shells surrounding the interest point or to the sides of the path
      // Some shells close, some far away (to lure Sailor away into dunes or the shoreline)
      let numShells = 3 + Math.floor(Math.random() * 3);
      for (let s = 0; s < numShells; s++) {
        let shellX, shellY;
        if (Math.random() < 0.4) {
          // Close shell
          shellX = x + (Math.random() - 0.5) * 140;
          shellY = currentY + (Math.random() - 0.5) * 140;
        } else {
          // Far shell (towards dunes or the shoreline)
          let side = Math.random() < 0.5 ? 1 : -1;
          shellX = x + side * (160 + Math.random() * 120);
          shellY = currentY + (Math.random() - 0.5) * 200;
        }
        
        // Clamp to beach width
        shellX = Math.max(160, Math.min(740, shellX));

        shells.push({
          x: shellX,
          y: shellY,
          collected: false,
          missed: false,
          color: SHELL_COLORS[Math.floor(Math.random() * SHELL_COLORS.length)],
          // Cosmetic silhouette variant only (fan/scallop, spiral, clam-arc) -
          // no rarity or mechanical difference between shapes.
          shapeType: Math.floor(Math.random() * 3),
          size: 7 + Math.random() * 4
        });
      }
    }

    // A few extra shells scattered near Sailor's starting position so the
    // opening view shows beach content immediately, rather than bare sand
    // for the ~500px walk up to the first interest point. Same shell object
    // shape as above - no change to collection/forfeit rules.
    for (let s = 0; s < 4; s++) {
      shells.push({
        x: 260 + Math.random() * 360,
        y: 340 + Math.random() * 140,
        collected: false,
        missed: false,
        color: SHELL_COLORS[Math.floor(Math.random() * SHELL_COLORS.length)],
        shapeType: Math.floor(Math.random() * 3),
        size: 7 + Math.random() * 4
      });
    }
  }

  function resetGame() {
    isGameOver = false;
    shellsCollected = 0;
    shellsMissed = 0;
    document.getElementById('score-collected').innerText = '0';
    document.getElementById('score-missed').innerText = '0';
    document.getElementById('end-overlay').classList.add('hidden');

    sailor = { x: 400, y: 400, vx: 0, vy: 0, width: 22, height: 32, facingLeft: false, isMoving: false };
    bupa = { 
      x: 400, 
      y: 480, 
      vx: 0, 
      vy: 0, 
      state: 'TROTTING',
      currentTargetIdx: 0,
      pauseTimer: 0,
      pauseDuration: 0,
      facingLeft: false,
      meowTimer: 0,
      stateProgress: 0,
      reunionTimer: 0,
      sailorNearStillTimer: 0
    };
    cameraY = sailor.y - 400;
    crabs = [];
    crabSpawnTimer = 20.0 + Math.random() * 20.0;
    shellSparkleTimer = 1.0 + Math.random() * 2.0;

    generateLevel();
  }

  // --- GAMEPLAY LOOPS ---
  let lastTime = 0;
  function gameTick(time) {
    if (!lastTime) lastTime = time;
    let dt = (time - lastTime) / 1000;
    // Cap dt to prevent massive jumps when switching tabs
    if (dt > 0.1) dt = 0.1;

    update(dt);
    draw();

    lastTime = time;
    requestAnimationFrame(gameTick);
  }

  function update(dt) {
    // Poll gamepad for restart button even if game is over
    const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
    let gp = null;
    for (let i = 0; i < gamepads.length; i++) {
      if (gamepads[i]) {
        gp = gamepads[i];
        break;
      }
    }

    if (gp && gp.buttons && gp.buttons.length > 0) {
      const button0Down = gp.buttons[0].pressed;
      if (button0Down && !gpButton0WasDown && isGameOver) {
        resetGame();
      }
      gpButton0WasDown = button0Down;
    } else {
      gpButton0WasDown = false;
    }

    if (isGameOver) return;

    // --- SAILOR CONTROLS & PHYSICS ---
    sailor.vx = 0;
    sailor.vy = 0;
    sailor.isMoving = false;

    // Apply keyboard controls exactly as before
    if (keys['ArrowUp'] || keys['KeyW']) { sailor.vy = -CONFIG.SAILOR_SPEED; sailor.isMoving = true; }
    if (keys['ArrowDown'] || keys['KeyS']) { sailor.vy = CONFIG.SAILOR_SPEED; sailor.isMoving = true; }
    if (keys['ArrowLeft'] || keys['KeyA']) { sailor.vx = -CONFIG.SAILOR_SPEED; sailor.facingLeft = true; sailor.isMoving = true; }
    if (keys['ArrowRight'] || keys['KeyD']) { sailor.vx = CONFIG.SAILOR_SPEED; sailor.facingLeft = false; sailor.isMoving = true; }

    // If gamepad is connected, integrate its inputs
    if (gp) {
      let gpX = 0;
      let gpY = 0;

      if (gp.axes && gp.axes.length >= 2) {
        const lx = gp.axes[0];
        const ly = gp.axes[1];
        if (Math.abs(lx) > 0.3) gpX += lx;
        if (Math.abs(ly) > 0.3) gpY += ly;
      }
      if (gp.buttons && gp.buttons.length > 15) {
        if (gp.buttons[12] && gp.buttons[12].pressed) gpY -= 1;
        if (gp.buttons[13] && gp.buttons[13].pressed) gpY += 1;
        if (gp.buttons[14] && gp.buttons[14].pressed) gpX -= 1;
        if (gp.buttons[15] && gp.buttons[15].pressed) gpX += 1;
      }

      if (gpX !== 0 || gpY !== 0) {
        // Convert keyboard velocities to normalized values
        let kbdX = 0;
        let kbdY = 0;
        if (sailor.vx < 0) kbdX = -1;
        if (sailor.vx > 0) kbdX = 1;
        if (sailor.vy < 0) kbdY = -1;
        if (sailor.vy > 0) kbdY = 1;

        // Combine inputs and clamp to valid range [-1, 1]
        let combinedX = Math.max(-1, Math.min(1, kbdX + gpX));
        let combinedY = Math.max(-1, Math.min(1, kbdY + gpY));

        sailor.vx = combinedX * CONFIG.SAILOR_SPEED;
        sailor.vy = combinedY * CONFIG.SAILOR_SPEED;

        if (combinedX < 0) sailor.facingLeft = true;
        if (combinedX > 0) sailor.facingLeft = false;

        if (combinedX !== 0 || combinedY !== 0) {
          sailor.isMoving = true;
        }
      }
    }

    sailor.x += sailor.vx * dt;
    sailor.y += sailor.vy * dt;

    // Constrain Sailor to beach boundaries (X = 140 is waterline boundary, X = 740 is dry dunes boundary)
    if (sailor.x < 140) sailor.x = 140;
    if (sailor.x > 740) sailor.x = 740;

    // --- BUPA DECISION ENGINE / STATE MACHINE ---
    const target = interestPoints[bupa.currentTargetIdx];
    const dx = sailor.x - bupa.x;
    const dy = sailor.y - bupa.y;
    const distanceToSailor = Math.sqrt(dx * dx + dy * dy);

    if (bupa.meowTimer > 0) {
      bupa.meowTimer -= dt;
    }

    if (bupa.state === 'TROTTING') {
      if (target) {
        // Move towards current target interest point
        const bdx = target.x - bupa.x;
        const bdy = target.y - bupa.y;
        const distToTarget = Math.sqrt(bdx * bdx + bdy * bdy);
        
        bupa.facingLeft = bdx < 0;

        if (distToTarget < 10) {
          // Arrived at interest point! Transition to investigating
          bupa.state = 'INVESTIGATING';
          target.visited = true;
          const range = CONFIG.PAUSE_DURATIONS[target.type];
          bupa.pauseDuration = range.min + Math.random() * (range.max - range.min);
          bupa.pauseTimer = bupa.pauseDuration;
          bupa.vx = 0;
          bupa.vy = 0;
        } else {
          // Check proximity constraint
          if (distanceToSailor > CONFIG.COMFORT_RADIUS) {
            // Sailor is too far! Trigger check-back sitting state
            bupa.state = 'CHECK_BACK';
            bupa.vx = 0;
            bupa.vy = 0;
            bupa.meowTimer = 1.8; // Show "?" or "meow" bubble for 1.8s
          } else {
            // Trotting ahead
            bupa.vx = (bdx / distToTarget) * CONFIG.BUPA_TROTTING_SPEED;
            bupa.vy = (bdy / distToTarget) * CONFIG.BUPA_TROTTING_SPEED;
            bupa.x += bupa.vx * dt;
            bupa.y += bupa.vy * dt;
          }
        }
      } else {
        // No more targets -> finished walking!
        triggerGameOver();
      }
    } 
    else if (bupa.state === 'CHECK_BACK') {
      // Waiting for Sailor to catch up
      bupa.vx = 0;
      bupa.vy = 0;
      
      // Face Sailor
      bupa.facingLeft = (sailor.x < bupa.x);

      // Transition back when close enough
      if (distanceToSailor <= CONFIG.REASSURE_RADIUS) {
        bupa.state = 'TROTTING';
        bupa.reunionTimer = 1.0;
        bupa.meowTimer = 0;
      }
    } 
    else if (bupa.state === 'INVESTIGATING') {
      bupa.vx = 0;
      bupa.vy = 0;
      bupa.pauseTimer -= dt;
      bupa.stateProgress = 1.0 - (bupa.pauseTimer / bupa.pauseDuration);

      if (bupa.pauseTimer <= 0) {
        // Move to next interest point
        bupa.currentTargetIdx++;
        if (bupa.currentTargetIdx >= interestPoints.length) {
          triggerGameOver();
        } else {
          bupa.state = 'TROTTING';
        }
      }
    }

    // --- CAMERA SCROLLING ---
    // Camera Y smoothly targets Bupa's position minus a comfortable vertical offset
    const targetCameraY = bupa.y - 360;
    cameraY += (targetCameraY - cameraY) * CONFIG.CAMERA_LERP;

    // Constrain camera scrolling to not show below start or go too high too early
    if (cameraY > 200) cameraY = 200;

    // --- SHELL COLLECTION & SCARCITY ---
    const cameraBottom = cameraY + 600;
    
    for (let shell of shells) {
      if (!shell.collected && !shell.missed) {
        // Check collision with Sailor
        const sdx = sailor.x - shell.x;
        const sdy = sailor.y - shell.y;
        const dist = Math.sqrt(sdx * sdx + sdy * sdy);
        
        if (dist < 22) {
          shell.collected = true;
          shellsCollected++;
          document.getElementById('score-collected').innerText = shellsCollected;
          // Spawn little splash particles
          spawnCollectParticles(shell.x, shell.y, shell.color);
        }
        
        // Check if shell went off-screen behind camera
        if (shell.y > cameraBottom) {
          shell.missed = true;
          shellsMissed++;
          document.getElementById('score-missed').innerText = shellsMissed;
        }
      }
    }

    // Sailor bounds relative to camera (don't let Sailor fall completely off bottom of screen)
    if (sailor.y > cameraBottom - 20) {
      sailor.y = cameraBottom - 20;
    }
    // Also limit top of screen so Sailor doesn't wander off-camera top
    if (sailor.y < cameraY + 20) {
      sailor.y = cameraY + 20;
    }

    // Update Bupa reunion timer
    if (bupa.reunionTimer > 0) {
      bupa.reunionTimer -= dt;
    }

    // Update proximity check for Sailor-near-Bupa affection
    if (distanceToSailor < 40 && !sailor.isMoving) {
      bupa.sailorNearStillTimer = (bupa.sailorNearStillTimer || 0) + dt;
    } else {
      bupa.sailorNearStillTimer = 0;
    }

    // Update crabs
    if (crabSpawnTimer > 0) {
      crabSpawnTimer -= dt;
    } else {
      spawnCrab();
      crabSpawnTimer = 40.0 + Math.random() * 30.0;
    }

    for (let crab of crabs) {
      crab.timer += dt;
      if (crab.timer < 0.5) {
        crab.state = 'EMERGING';
      } else if (crab.timer < 3.0) {
        crab.state = 'SCUTTLING';
        const progress = (crab.timer - 0.5) / 2.5;
        const prevX = crab.x;
        crab.x = crab.startX + (crab.targetX - crab.startX) * progress;
        crab.y = crab.startY + (crab.targetY - crab.startY) * progress;
        crab.facingLeft = (crab.x < prevX);
      } else {
        crab.state = 'BURROWING';
      }
    }
    crabs = crabs.filter(crab => crab.timer < crab.duration);

    // Update shell sparkles
    if (shellSparkleTimer > 0) {
      shellSparkleTimer -= dt;
    } else {
      triggerShellSparkle();
      shellSparkleTimer = 2.0 + Math.random() * 2.0;
    }

    // Update particles
    for (let p of particles) {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.alpha -= dt * 1.5;
    }
    particles = particles.filter(p => p.alpha > 0);

    // Update HUD/Debug panel
    const distText = Math.round(distanceToSailor);
    document.getElementById('debug-panel').innerHTML = 
      `Bupa: ${bupa.state} | Dist: ${distText}px | Stop: ${bupa.currentTargetIdx + 1}/${CONFIG.TOTAL_STOPS}`;
  }

  function spawnCollectParticles(x, y, color) {
    for (let i = 0; i < 8; i++) {
      let angle = Math.random() * Math.PI * 2;
      let speed = 40 + Math.random() * 60;
      particles.push({
        x: x,
        y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        alpha: 1.0,
        color: color,
        size: 2 + Math.random() * 2
      });
    }
  }

  function triggerGameOver() {
    isGameOver = true;
    document.getElementById('final-collected').innerText = shellsCollected;
    document.getElementById('final-missed').innerText = shellsMissed;
    document.getElementById('end-overlay').classList.remove('hidden');
  }

  // --- VISUAL HELPERS (texture, shading, shells, shadows) ---

  // A few sparse scatter points, reused at different tile pitches. Kept
  // deliberately thin so surfaces read as plain sand/dune with just a hint
  // of grain rather than a texture.
  const SAND_SPECKLES = [
    // Cluster A: Sparse fleck cluster
    { dx: 0.15, dy: 0.20, w: 2, h: 2 },
    { dx: 0.18, dy: 0.23, w: 1, h: 1 },

    // Cluster B: Directional grain (horizontal dash)
    { dx: 0.65, dy: 0.45, w: 3, h: 1 },

    // Cluster C: Rare static pawprint / shell imprint detail
    { dx: 0.35, dy: 0.75, w: 2, h: 2 },
    { dx: 0.32, dy: 0.72, w: 1, h: 1 },
    { dx: 0.38, dy: 0.72, w: 1, h: 1 }
  ];
  const DUNE_SPECKLES = [
    // Cluster A: Grain line
    { dx: 0.25, dy: 0.35, w: 3, h: 1 },
    // Cluster B: Flecks
    { dx: 0.70, dy: 0.65, w: 2, h: 2 },
    { dx: 0.73, dy: 0.68, w: 1, h: 1 }
  ];

  // Scatters a fixed speckle field across a region by repeating one small
  // tile, rather than re-rolling randomness every frame (which would flicker).
  function drawSpeckleField(x0, x1, yTop, yBottom, tileSize, speckles, color) {
    const colStart = Math.floor(x0 / tileSize);
    const colEnd = Math.floor(x1 / tileSize);
    const rowStart = Math.floor(yTop / tileSize);
    const rowEnd = Math.floor(yBottom / tileSize);
    ctx.fillStyle = color;
    for (let row = rowStart; row <= rowEnd; row++) {
      for (let col = colStart; col <= colEnd; col++) {
        for (let sp of speckles) {
          const wx = col * tileSize + sp.dx * tileSize;
          const wy = row * tileSize + sp.dy * tileSize;
          if (wx >= x0 && wx <= x1) {
            const w = sp.w !== undefined ? sp.w : sp.size;
            const h = sp.h !== undefined ? sp.h : sp.size;
            ctx.fillRect(Math.floor(wx), Math.floor(wy), w, h);
          }
        }
      }
    }
  }

  // Both side contours use long, deterministic profiles with varied segment
  // heights. This keeps the pixel-art steps calm without exposing a row grid.
  const SHORELINE_SEGMENT_HEIGHTS = [
    10, 6, 14, 8, 4, 12, 6, 10, 16, 4, 8, 12, 6, 14,
    4, 10, 8, 6, 12, 4, 14, 8, 10, 6, 16, 4, 8, 16
  ];
  const SHORELINE_CURVE_OFFSETS = [
    0, -2, -4, -4, -6, -8, -8, -10, -10, -12, -10, -10, -8, -8,
    -6, -6, -4, -4, -2, -2, 0, 0, 2, 0, -2, 0, 0, 0
  ];
  const SHORELINE_PROFILE = [
    ...SHORELINE_SEGMENT_HEIGHTS.map((height, index) => ({
      height,
      offset: SHORELINE_CURVE_OFFSETS[index]
    })),
    ...SHORELINE_SEGMENT_HEIGHTS.map((height, index) => ({
      height,
      offset: -SHORELINE_CURVE_OFFSETS[index]
    }))
  ];
  const DUNE_EDGE_PROFILE = [
    { height: 16, offset: 0 }, { height: 8, offset: -2 }, { height: 6, offset: -4 },
    { height: 12, offset: -2 }, { height: 4, offset: 0 }, { height: 10, offset: 0 },
    { height: 14, offset: 4 }, { height: 6, offset: 2 }, { height: 8, offset: 0 },
    { height: 4, offset: -2 }, { height: 16, offset: 0 }, { height: 10, offset: 0 },
    { height: 6, offset: 0 }, { height: 12, offset: -2 }, { height: 8, offset: -4 },
    { height: 4, offset: -2 }, { height: 14, offset: 0 }, { height: 10, offset: 2 },
    { height: 6, offset: 4 }, { height: 8, offset: 2 }, { height: 12, offset: 0 },
    { height: 4, offset: -2 }, { height: 10, offset: 0 }, { height: 16, offset: 2 },
    { height: 6, offset: 0 }, { height: 8, offset: -2 }, { height: 4, offset: 0 },
    { height: 14, offset: 0 }
  ];
  const WATER_SCATTER_LAYERS = [
    { cellWidth: 44, cellHeight: 52, density: 0.24, seed: 11, color: '#eaf6f7', alpha: 0.46 },
    { cellWidth: 62, cellHeight: 68, density: 0.12, seed: 29, color: '#ffffff', alpha: 0.58 }
  ];

  function getProfileHeight(profile) {
    return profile.reduce((total, segment) => total + segment.height, 0);
  }

  function coordinateHash(x, y, seed) {
    const value = Math.sin(x * 127.1 + y * 311.7 + seed * 74.7) * 43758.5453;
    return value - Math.floor(value);
  }

  function forEachProfileSegment(profile, yTop, yBottom, drawSegment) {
    const profileHeight = getProfileHeight(profile);
    const firstCycle = Math.floor(yTop / profileHeight) * profileHeight;
    for (let cycleY = firstCycle; cycleY <= yBottom; cycleY += profileHeight) {
      let y = cycleY;
      for (let segment of profile) {
        if (y + segment.height > yTop && y < yBottom) {
          drawSegment(y, segment.height, segment.offset);
        }
        y += segment.height;
      }
    }
  }

  // Fill each profiled side as one continuous path. Stacking separate
  // rectangles can reveal hairline seams when the fractional camera moves.
  function drawProfiledSide(profile, boundaryX, yTop, yBottom, side, color) {
    const segments = [];
    forEachProfileSegment(profile, yTop, yBottom, (y, height, offset) => {
      segments.push({ y, height, offset });
    });
    if (segments.length === 0) return;

    const outerX = side === 'left' ? 0 : canvas.width;
    const first = segments[0];
    const last = segments[segments.length - 1];
    const bottom = last.y + last.height;

    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(outerX, first.y);
    ctx.lineTo(boundaryX + first.offset, first.y);
    for (let i = 0; i < segments.length; i++) {
      const segment = segments[i];
      const segmentBottom = segment.y + segment.height;
      ctx.lineTo(boundaryX + segment.offset, segmentBottom);
      if (i + 1 < segments.length) {
        ctx.lineTo(boundaryX + segments[i + 1].offset, segmentBottom);
      }
    }
    ctx.lineTo(outerX, bottom);
    ctx.closePath();
    ctx.fill();
  }

  // The shoreline profile's weighted offset is zero, keeping X=150 as its
  // exact average without assembling the water from horizontal strips.
  function drawOcean(boundaryX, yTop, yBottom) {
    drawProfiledSide(SHORELINE_PROFILE, boundaryX, yTop, yBottom, 'left', PALETTE.water);
  }

  function drawDunes(boundaryX, yTop, yBottom) {
    drawProfiledSide(DUNE_EDGE_PROFILE, boundaryX, yTop, yBottom, 'right', PALETTE.dune);
  }

  // One stepped edge of a shoreline band, offset horizontally from the
  // profile's boundary by `delta`. Reused by drawProfiledBand below to
  // build both sides of a band from the same jagged contour.
  function buildSteppedEdge(segments, boundaryX, delta) {
    const points = [];
    for (let i = 0; i < segments.length; i++) {
      const segment = segments[i];
      const x = boundaryX + segment.offset + delta;
      points.push({ x, y: segment.y });
      points.push({ x, y: segment.y + segment.height });
      if (i + 1 < segments.length) {
        const nextX = boundaryX + segments[i + 1].offset + delta;
        points.push({ x: nextX, y: segment.y + segment.height });
      }
    }
    return points;
  }

  // Fills a static band that hugs the same jagged shoreline contour as the
  // water/sand fills, offset by two deltas (e.g. a few px into the water,
  // a few px into the sand). Used for the waterline foam edge and wet-sand
  // band - no animation, just a fixed shape following the existing profile.
  function drawProfiledBand(profile, boundaryX, yTop, yBottom, innerDelta, outerDelta, color) {
    const segments = [];
    forEachProfileSegment(profile, yTop, yBottom, (y, height, offset) => {
      segments.push({ y, height, offset });
    });
    if (segments.length === 0) return;

    const innerEdge = buildSteppedEdge(segments, boundaryX, innerDelta);
    const outerEdge = buildSteppedEdge(segments, boundaryX, outerDelta);

    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(innerEdge[0].x, innerEdge[0].y);
    for (let i = 1; i < innerEdge.length; i++) ctx.lineTo(innerEdge[i].x, innerEdge[i].y);
    for (let i = outerEdge.length - 1; i >= 0; i--) ctx.lineTo(outerEdge[i].x, outerEdge[i].y);
    ctx.closePath();
    ctx.fill();
  }

  // Two-value waterline seam: a darker wet-sand band just past the shore,
  // plus a light foam edge straddling the contour itself. Both are static
  // fills tracking SHORELINE_PROFILE - no tide motion, just shading.
  const WATERLINE_WET_SAND = shadeColor(PALETTE.sand, -70);
  const WATERLINE_FOAM = '#eaf6f7';
  function drawWaterline(boundaryX, yTop, yBottom) {
    drawProfiledBand(SHORELINE_PROFILE, boundaryX, yTop, yBottom, 0, 7, WATERLINE_WET_SAND);
    drawProfiledBand(SHORELINE_PROFILE, boundaryX, yTop, yBottom, -3, 2, WATERLINE_FOAM);
  }

  function drawWaterMark(x, y, variant) {
    if (variant === 0) {
      ctx.fillRect(x, y, 2, 2);
    } else if (variant === 1) {
      ctx.fillRect(x, y, 4, 2);
    } else if (variant === 2) {
      ctx.fillRect(x, y, 2, 4);
      ctx.fillRect(x + 2, y + 2, 2, 2);
    } else if (variant === 3) {
      ctx.fillRect(x, y, 6, 2);
    } else {
      ctx.fillRect(x, y, 4, 2);
      ctx.fillRect(x + 2, y + 2, 2, 2);
    }
  }

  // Foam placement is hashed per irregular contour segment, so chunks stay
  // stable in world space without sharing a repeated Y row or cycle pattern.
  function drawShoreFoam(boundaryX, yTop, yBottom) {
    const t = performance.now() * 0.0006;
    ctx.save();
    forEachProfileSegment(SHORELINE_PROFILE, yTop - 4, yBottom + 4, (y, height, offset) => {
      const segmentKey = Math.floor(y / 2);
      if (coordinateHash(segmentKey, height, 41) > 0.44) return;

      const verticalSlots = Math.max(1, Math.floor((height - 2) / 2));
      const foamY = y + 2 * Math.floor(coordinateHash(segmentKey, height, 43) * verticalSlots);
      const xJitter = (Math.floor(coordinateHash(segmentKey, offset, 47) * 3) - 1) * 2;
      const variant = Math.floor(coordinateHash(segmentKey, height, 53) * 5);
      const pulse = 0.68 + Math.sin(t * 2.2 + coordinateHash(segmentKey, offset, 59) * Math.PI * 2) * 0.18;

      ctx.globalAlpha = pulse;
      ctx.fillStyle = variant % 2 === 0 ? '#ffffff' : '#eaf6f7';
      drawWaterMark(boundaryX + offset + xJitter - 2, foamY, variant);
    });
    ctx.restore();
  }

  // Sparse, independently jittered 2D cells replace the old one-mark-per-row
  // fleck and glint loops. Two unequal grids prevent shared horizontal rails.
  function drawWaterDetails(yTop, yBottom) {
    const t = performance.now() * 0.001;
    ctx.save();

    for (let layer of WATER_SCATTER_LAYERS) {
      const rowStart = Math.floor((yTop - layer.cellHeight) / layer.cellHeight);
      const rowEnd = Math.floor((yBottom + layer.cellHeight) / layer.cellHeight);
      const colEnd = Math.ceil(138 / layer.cellWidth);

      for (let row = rowStart; row <= rowEnd; row++) {
        for (let col = 0; col < colEnd; col++) {
          const presence = coordinateHash(col, row, layer.seed);
          if (presence > layer.density) continue;

          const cellX = col * layer.cellWidth;
          if (cellX + 6 > 136) continue;

          const xMin = cellX + 4;
          const xMax = Math.min(130, cellX + layer.cellWidth - 8);
          const xSlots = Math.max(1, Math.floor((xMax - xMin) / 2) + 1);
          const ySlots = Math.max(1, Math.floor((layer.cellHeight - 10) / 2));
          const x = xMin + 2 * Math.floor(coordinateHash(col, row, layer.seed + 2) * xSlots);
          const y = row * layer.cellHeight + 4 + 2 * Math.floor(coordinateHash(col, row, layer.seed + 4) * ySlots);
          const variant = Math.floor(coordinateHash(col, row, layer.seed + 6) * 5);
          const phase = coordinateHash(col, row, layer.seed + 8) * Math.PI * 2;

          ctx.fillStyle = layer.color;
          ctx.globalAlpha = layer.alpha * (0.72 + Math.sin(t * 0.7 + phase) * 0.18);
          drawWaterMark(x, y, variant);
        }
      }
    }

    ctx.restore();
  }

  // Soft grounding shadow used under every game-world object for a
  // consistent shadow rule across characters, shells, and terrain features.
  function drawGroundShadow(x, y, radiusX, radiusY) {
    ctx.save();
    ctx.globalAlpha = 0.22;
    ctx.fillStyle = '#1a1c1e';
    ctx.beginPath();
    ctx.ellipse(x, y, radiusX, radiusY, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function shadeColor(hex, amount) {
    const num = parseInt(hex.slice(1), 16);
    let r = (num >> 16) + amount;
    let g = ((num >> 8) & 0xff) + amount;
    let b = (num & 0xff) + amount;
    r = Math.max(0, Math.min(255, r));
    g = Math.max(0, Math.min(255, g));
    b = Math.max(0, Math.min(255, b));
    return '#' + (0x1000000 + r * 0x10000 + g * 0x100 + b).toString(16).slice(1);
  }

  // Shell silhouettes: fluted scallop, spiral/conch, and oval clam. Purely a
  // cosmetic pick (shell.shapeType) - no rarity or gameplay difference.
  function drawShellShape(shell) {
    const s = shell.size;
    const color = shell.color;
    const dark = shadeColor(color, -50);
    const outline = '#7a6a52';
    // The whole scene renders through a half-scale pixel buffer (see
    // PIXEL_SCALE), so hairline strokes need to be drawn thicker here or
    // they anti-alias away to nothing once downscaled.
    const OUTLINE_LW = 2.5;

    ctx.save();
    ctx.translate(shell.x, shell.y);

    if (shell.shapeType === 0) {
      // Scallop: broad stepped crown, rounded fan sides, tapered hinge.
      ctx.beginPath();
      ctx.moveTo(0, s * 0.8);
      ctx.lineTo(-s * 0.45, s * 0.45);
      ctx.lineTo(-s * 0.75, s * 0.2);
      ctx.lineTo(-s, -s * 0.2);
      ctx.lineTo(-s, -s * 0.5);
      ctx.lineTo(-s * 0.75, -s * 0.5);
      ctx.lineTo(-s * 0.75, -s * 0.72);
      ctx.lineTo(-s * 0.35, -s * 0.72);
      ctx.lineTo(-s * 0.35, -s * 0.9);
      ctx.lineTo(s * 0.35, -s * 0.9);
      ctx.lineTo(s * 0.35, -s * 0.72);
      ctx.lineTo(s * 0.75, -s * 0.72);
      ctx.lineTo(s * 0.75, -s * 0.5);
      ctx.lineTo(s, -s * 0.5);
      ctx.lineTo(s, -s * 0.2);
      ctx.lineTo(s * 0.75, s * 0.2);
      ctx.lineTo(s * 0.45, s * 0.45);
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();
      ctx.lineWidth = OUTLINE_LW;
      ctx.strokeStyle = outline;
      ctx.stroke();
      // Three short ribs radiate from the hinge without filling the sprite.
      ctx.strokeStyle = dark;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, s * 0.42);
      ctx.lineTo(0, -s * 0.52);
      ctx.moveTo(-s * 0.14, s * 0.34);
      ctx.lineTo(-s * 0.5, -s * 0.4);
      ctx.moveTo(s * 0.14, s * 0.34);
      ctx.lineTo(s * 0.5, -s * 0.4);
      ctx.stroke();
      ctx.fillStyle = dark;
      ctx.fillRect(-2, Math.floor(s * 0.52), 4, 2);
    } else if (shell.shapeType === 1) {
      // Conch: an asymmetric stepped body, small mouth, and one clear curl.
      ctx.beginPath();
      ctx.moveTo(-s * 0.85, -s * 0.25);
      ctx.lineTo(-s * 0.6, -s * 0.65);
      ctx.lineTo(-s * 0.15, -s * 0.85);
      ctx.lineTo(s * 0.4, -s * 0.7);
      ctx.lineTo(s * 0.7, -s * 0.4);
      ctx.lineTo(s * 0.75, 0);
      ctx.lineTo(s, s * 0.2);
      ctx.lineTo(s * 0.55, s * 0.35);
      ctx.lineTo(s * 0.35, s * 0.7);
      ctx.lineTo(-s * 0.2, s * 0.8);
      ctx.lineTo(-s * 0.7, s * 0.5);
      ctx.lineTo(-s * 0.9, s * 0.1);
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();
      ctx.lineWidth = OUTLINE_LW;
      ctx.strokeStyle = outline;
      ctx.stroke();
      ctx.strokeStyle = dark;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(-s * 0.1, -s * 0.02, s * 0.32, 0.2, Math.PI * 1.75);
      ctx.stroke();
      ctx.fillStyle = dark;
      ctx.fillRect(Math.floor(s * 0.5), Math.floor(s * 0.08), 2, 2);
    } else {
      // Clam: a squat stepped oval with a tiny hinge and ridge pixels.
      ctx.beginPath();
      ctx.moveTo(-s, -s * 0.15);
      ctx.lineTo(-s * 0.75, -s * 0.55);
      ctx.lineTo(-s * 0.25, -s * 0.75);
      ctx.lineTo(s * 0.35, -s * 0.75);
      ctx.lineTo(s * 0.8, -s * 0.5);
      ctx.lineTo(s, -s * 0.1);
      ctx.lineTo(s * 0.85, s * 0.4);
      ctx.lineTo(s * 0.35, s * 0.6);
      ctx.lineTo(-s * 0.45, s * 0.6);
      ctx.lineTo(-s * 0.85, s * 0.35);
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();
      ctx.lineWidth = OUTLINE_LW;
      ctx.strokeStyle = outline;
      ctx.stroke();
      ctx.fillStyle = dark;
      ctx.fillRect(-2, Math.floor(s * 0.25), 4, 2);
      ctx.fillRect(-Math.floor(s * 0.45), 0, 2, 2);
      ctx.fillRect(Math.floor(s * 0.45) - 2, 0, 2, 2);
    }

    ctx.restore();
  }

  // --- DRAWING / RENDERING ---
  function draw() {
    ctx.clearRect(0, 0, pixelCanvas.width, pixelCanvas.height);

    ctx.save();
    // Everything below is drawn in the same 800x600 world-space coordinates
    // as before; this scale maps it onto the shared low-res pixel buffer.
    ctx.scale(PIXEL_SCALE, PIXEL_SCALE);
    // Translate rendering context based on cameraY
    ctx.translate(0, -cameraY);

    const viewTop = cameraY - 100;
    const viewBottom = cameraY + 700;

    // 1. Draw sand beach background - flat surfaces with only a sparse
    // pixel-speckle hint of grain, no checker shading or banded texture.
    ctx.fillStyle = PALETTE.sand;
    ctx.fillRect(0, viewTop, canvas.width, 800);
    drawSpeckleField(150, 720, viewTop, viewBottom, 64, SAND_SPECKLES, PALETTE.sandGrain);

    // Draw Ocean (water) on left - a plain flat fill with a small, stable
    // stepped edge. This changes only the shoreline silhouette, not gameplay.
    drawOcean(150, viewTop, viewBottom);

    // Static waterline seam - wet-sand band plus a light foam edge - so the
    // water/sand meeting line reads as shaded rather than a flat hard edge.
    drawWaterline(150, viewTop, viewBottom);

    // Sparse water details use irregular 2D scatter rather than Y rows.
    drawWaterDetails(viewTop, viewBottom);

    // Water shoreline foam - blocky, stepped edge; the only textured hint
    // the beach carries for white water, per the plain-surfaces direction.
    drawShoreFoam(150, viewTop, viewBottom);

    // Draw dunes & dry grass on the right side with a separate restrained
    // stepped contour, keeping the center sand visually open and playable.
    drawDunes(720, viewTop, viewBottom);
    drawSpeckleField(720, 800, viewTop, viewBottom, 56, DUNE_SPECKLES, PALETTE.duneGrain);

    // Draw Dune tufts & plants
    for (let y = Math.floor(viewTop / 120) * 120 - 120; y < viewBottom; y += 120) {
      const row = Math.round(y / 120);
      drawGrassTuft(750, y + 20, row);
      drawGrassTuft(772, y + 80, row + 1);
      if (row % 2 === 0) drawDunePlant(792, y + 50, row);
    }

    // 2. Draw Interest Points
    for (let ip of interestPoints) {
      drawInterestPoint(ip);
    }

    // 3. Draw Shells
    for (let shell of shells) {
      if (!shell.collected && !shell.missed) {
        drawGroundShadow(shell.x, shell.y + shell.size * 0.6, shell.size * 0.6, shell.size * 0.28);
        drawShellShape(shell);
        // Very limited deterministic shell-adjacent sand marks
        ctx.fillStyle = PALETTE.sandGrain;
        const markOffset = Math.abs(Math.sin(shell.x * 17.5 + shell.y * 31.2)) % 1;
        if (markOffset > 0.45) {
          ctx.fillRect(shell.x + (markOffset > 0.72 ? 9 : -11), shell.y + 4, 2, 1);
        }
      }
    }

    // 4. Draw Particles
    for (let p of particles) {
      ctx.globalAlpha = p.alpha;
      if (p.isGlint) {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(Math.floor(p.x), Math.floor(p.y), 1, 1);
        if (p.alpha > 0.4) {
          ctx.fillRect(Math.floor(p.x) - 1, Math.floor(p.y), 1, 1);
          ctx.fillRect(Math.floor(p.x) + 1, Math.floor(p.y), 1, 1);
          ctx.fillRect(Math.floor(p.x), Math.floor(p.y) - 1, 1, 1);
          ctx.fillRect(Math.floor(p.x), Math.floor(p.y) + 1, 1, 1);
        }
      } else {
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
      }
    }
    ctx.globalAlpha = 1.0;

    // 4.5 Draw Crabs
    for (let crab of crabs) {
      drawCrab(crab);
    }

    // 5. Draw Sailor (young 5yo girl, back-facing, blue outfit, warm brown pigtails)
    drawGroundShadow(sailor.x, sailor.y + 10 * SAILOR_DRAW_SCALE, 10 * SAILOR_DRAW_SCALE, 4 * SAILOR_DRAW_SCALE);
    drawSailor();

    // 6. Draw Bupa (gray cat, small hint of white)
    drawGroundShadow(bupa.x, bupa.y + 6, 9, 3);
    drawBupa();

    ctx.restore();

    // Blit the low-res buffer up to the visible canvas with nearest-neighbor
    // scaling, which is what gives every element on screen the same chunky
    // pixel-art texture instead of smooth vector edges.
    displayCtx.clearRect(0, 0, canvas.width, canvas.height);
    displayCtx.drawImage(pixelCanvas, 0, 0, canvas.width, canvas.height);
  }

  // --- DRAWING HELPER FUNCTIONS ---

  // Both variants are derived from the single warm PALETTE.grass hue via
  // shadeColor(), rather than two independently-invented greens, so tufts
  // and the dune plant read as the same warm-leaning family. Three tones
  // (base/shadow/highlight) per variant, matching the object shading pass.
  const GRASS_PALETTES = [
    { base: PALETTE.grass, shadow: shadeColor(PALETTE.grass, -34), highlight: shadeColor(PALETTE.grass, 30) },
    { base: shadeColor(PALETTE.grass, 8), shadow: shadeColor(PALETTE.grass, -26), highlight: shadeColor(PALETTE.grass, 36) }
  ];

  function drawGrassTuft(x, y, variant) {
    const p = GRASS_PALETTES[((variant % GRASS_PALETTES.length) + GRASS_PALETTES.length) % GRASS_PALETTES.length];

    // Grounding shadow so the tuft reads as planted in the sand
    ctx.fillStyle = p.shadow;
    ctx.fillRect(x - 5, y + 10, 12, 3);

    // Calculate sway
    const t = performance.now() * 0.0015;
    const rowPhase = (variant || 0) * 0.5;
    const sway = Math.sin(t + rowPhase);
    let swayOffset = 0;
    if (sway > 0.4) swayOffset = 2;
    else if (sway < -0.4) swayOffset = -2;

    // Three plain blades
    ctx.fillStyle = p.base;
    ctx.fillRect(x - 1, y + 4, 3, 6);
    ctx.fillRect(x - 1 + swayOffset, y - 2, 3, 6);

    ctx.fillRect(x - 6, y + 7, 3, 5);
    ctx.fillRect(x - 6 + swayOffset, y + 2, 3, 5);

    ctx.fillRect(x + 5, y + 8, 3, 4);
    ctx.fillRect(x + 5 + swayOffset, y + 4, 3, 4);

    // Single highlight cap on the tallest (swaying) blade - the third tone
    // in the base/shadow/highlight recipe shared with every other object.
    ctx.fillStyle = p.highlight;
    ctx.fillRect(x - 1 + swayOffset, y - 2, 3, 2);
  }

  // Larger dune plant used sparingly among the grass tufts for variety -
  // one stem, two leaf clusters, base/shadow/highlight tones.
  function drawDunePlant(x, y, row) {
    ctx.fillStyle = shadeColor(PALETTE.grass, -34);
    ctx.fillRect(x - 6, y + 12, 14, 3);

    // Calculate sway
    const t = performance.now() * 0.0015;
    const rowPhase = (row || 0) * 0.5;
    const sway = Math.sin(t + rowPhase);
    let swayOffset = 0;
    if (sway > 0.4) swayOffset = 2;
    else if (sway < -0.4) swayOffset = -2;

    ctx.fillStyle = shadeColor(PALETTE.wood, -10);
    ctx.fillRect(x - 1, y + 5, 2, 7); // bottom stem
    ctx.fillRect(x - 1 + swayOffset, y - 2, 2, 7); // top stem

    ctx.fillStyle = PALETTE.grass;
    ctx.fillRect(x - 7 + swayOffset, y - 10, 6, 6);
    ctx.fillRect(x + 2 + swayOffset, y - 14, 6, 6);

    // Highlight tone on each leaf cluster
    ctx.fillStyle = shadeColor(PALETTE.grass, 30);
    ctx.fillRect(x - 7 + swayOffset, y - 10, 6, 2);
    ctx.fillRect(x + 2 + swayOffset, y - 14, 6, 2);
  }

  function drawInterestPoint(ip) {
    // Draw visual graphic representing the interest point
    if (ip.type !== 'tidepool' && ip.type !== 'umbrella') {
      drawGroundShadow(ip.x, ip.y + 10, 16, 5);
    }

    ctx.save();
    ctx.translate(ip.x, ip.y);

    if (ip.type === 'rock') {
      // Main rock shape - warm stone tone from PALETTE.stone, deliberately
      // distinct from Bupa's fur tone so he stays readable stopped beside
      // it. Base/shadow/highlight three-tone treatment.
      ctx.fillStyle = PALETTE.stone;
      ctx.fillRect(-12, -8, 24, 16);
      ctx.fillStyle = shadeColor(PALETTE.stone, -34); // shadow
      ctx.fillRect(-12, 4, 24, 4);
      ctx.fillStyle = shadeColor(PALETTE.stone, 30); // highlight
      ctx.fillRect(-12, -8, 24, 3);
      // Small shell-cluster accents at the base of the rock pile
      drawShellShape({ x: -14, y: 9, size: 5, color: '#e8a9a0', shapeType: 2 });
      drawShellShape({ x: 12, y: 8, size: 4, color: '#8fb9c9', shapeType: 0 });
    }
    else if (ip.type === 'driftwood') {
      // Driftwood log - base/shadow/highlight three-tone treatment (was
      // base+highlight only), no grain lines or branch stubs.
      ctx.fillStyle = PALETTE.wood;
      ctx.fillRect(-18, -4, 36, 8);
      ctx.fillStyle = shadeColor(PALETTE.wood, -30); // shadow
      ctx.fillRect(-18, 1, 36, 3);
      ctx.fillStyle = shadeColor(PALETTE.wood, 30); // highlight
      ctx.fillRect(-14, -4, 28, 3);
      // Small grass tuft growing beside the driftwood
      drawGrassTuft(20, -2, Math.round(ip.x));
    }
    else if (ip.type === 'tidepool') {
      // Chunky irregular rim and offset inner water make this read as a
      // shallow beach puddle rather than a circular marker. Scaled 1.4x so
      // the tidepool stays visually consistent with the new beach ball and
      // umbrella POIs without changing its puddle shape or shimmer behavior.
      // Deep/mid/highlight tones now derive from one warm PALETTE.tidepool
      // hue instead of three independently-chosen blues.
      ctx.fillStyle = shadeColor(PALETTE.tidepool, -14);
      ctx.beginPath();
      ctx.moveTo(-28, -3);
      ctx.lineTo(-22, -11);
      ctx.lineTo(-11, -14);
      ctx.lineTo(0, -11);
      ctx.lineTo(11, -14);
      ctx.lineTo(22, -8);
      ctx.lineTo(28, -3);
      ctx.lineTo(25, 6);
      ctx.lineTo(17, 11);
      ctx.lineTo(6, 11);
      ctx.lineTo(-6, 14);
      ctx.lineTo(-17, 11);
      ctx.lineTo(-25, 6);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = PALETTE.tidepool;
      ctx.beginPath();
      ctx.moveTo(-22, -3);
      ctx.lineTo(-17, -8);
      ctx.lineTo(-6, -11);
      ctx.lineTo(3, -8);
      ctx.lineTo(11, -11);
      ctx.lineTo(20, -6);
      ctx.lineTo(22, 0);
      ctx.lineTo(17, 6);
      ctx.lineTo(8, 8);
      ctx.lineTo(-3, 8);
      ctx.lineTo(-11, 11);
      ctx.lineTo(-20, 6);
      ctx.closePath();
      ctx.fill();

      // Two broken highlight pixels imply shallow reflected water without a
      // circular inner ring.
      ctx.fillStyle = shadeColor(PALETTE.tidepool, 40);
      ctx.fillRect(-14, -6, 6, 2);
      ctx.fillRect(-6, -8, 4, 2);

      // Blinking highlight pixel (pure white)
      const shimmerT = performance.now() * 0.002;
      if (Math.sin(shimmerT + ip.x) > 0.5) {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(-8, -8, 2, 2);
      }
    }
    else if (ip.type === 'beachball') {
      // Beach ball - bright round striped prop, the most legible beach
      // object at gameplay scale. Filled circle pixelates cleanly through
      // the half-res buffer; three colored vertical stripes + a lower
      // shadow band + a white highlight pixel read as "beach ball" in
      // under a second. Colors chosen to stay clear of sand and Bupa's fur.
      const r = 18;
      // White base
      ctx.fillStyle = '#fdf7ec';
      ctx.beginPath();
      ctx.arc(0, -2, r, 0, Math.PI * 2);
      ctx.fill();
      // Three colored vertical stripes, clipped to the circle
      ctx.save();
      ctx.beginPath();
      ctx.arc(0, -2, r, 0, Math.PI * 2);
      ctx.clip();
      ctx.fillStyle = PALETTE.coral; // red stripe
      ctx.fillRect(-r, -2 - r, 11, r * 2);
      ctx.fillStyle = '#3d7eb8'; // blue stripe
      ctx.fillRect(-6, -2 - r, 11, r * 2);
      ctx.fillStyle = PALETTE.gold; // yellow stripe
      ctx.fillRect(6, -2 - r, 11, r * 2);
      // Lower-rim shadow tone - the third (shadow) tone in the
      // base/shadow/highlight recipe, kept subtle so stripes stay clear.
      ctx.fillStyle = 'rgba(0, 0, 0, 0.16)';
      ctx.fillRect(-r, 6, r * 2, r);
      ctx.restore();
      // Tiny highlight pixel (upper left)
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(-11, -14, 2, 2);
    }
    else if (ip.type === 'umbrella') {
      // Beach umbrella - triangular canopy on a pole with a shade ellipse
      // on the sand. Reads as "umbrella" at a glance and gives Bupa a
      // shade patch to sit in. Shade is drawn larger than the default
      // ground shadow so it reads as shade, not as a separate object.
      // Pole (wood tone, shared with driftwood) with a slight lean;
      // highlight sliver clipped to the pole's own silhouette.
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(1, 12);
      ctx.lineTo(4, 12);
      ctx.lineTo(1, -30);
      ctx.lineTo(-2, -30);
      ctx.closePath();
      ctx.fillStyle = PALETTE.wood;
      ctx.fill();
      ctx.clip();
      ctx.fillStyle = shadeColor(PALETTE.wood, 30);
      ctx.fillRect(1, -30, 2, 42);
      ctx.restore();
      // Canopy (triangular, warm coral, slightly asymmetric), with a
      // clipped highlight near the apex - base/shadow/highlight treatment.
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(-24, -24);
      ctx.lineTo(20, -26);
      ctx.lineTo(-1, -40);
      ctx.closePath();
      ctx.fillStyle = PALETTE.coral;
      ctx.fill();
      ctx.clip();
      ctx.fillStyle = shadeColor(PALETTE.coral, 34);
      ctx.fillRect(-6, -40, 12, 5);
      ctx.restore();
      // Canopy underside shadow band
      ctx.fillStyle = shadeColor(PALETTE.coral, -30);
      ctx.fillRect(-24, -26, 44, 2);
      // Shade ellipse on the sand (clearly attached to the umbrella)
      ctx.save();
      ctx.globalAlpha = 0.20;
      ctx.fillStyle = '#1a1c1e';
      ctx.beginPath();
      ctx.ellipse(-5, 14, 34, 10, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // Draw indicator text above unvisited ones
    if (!ip.visited) {
      ctx.font = '10px Courier New';
      ctx.fillStyle = '#df8931';
      ctx.textAlign = 'center';
      ctx.fillText('•', 0, -18);
    }

    ctx.restore();
  }

  // Sprite-only shrink applied inside drawSailor(); does not touch
  // sailor.width/height (unused for movement/collision), CONFIG, or any
  // physics/collection radius.
  const SAILOR_DRAW_SCALE = 0.74;

  function drawSailor() {
    ctx.save();
    ctx.translate(sailor.x, sailor.y);

    // Direction flip
    if (sailor.facingLeft) {
      ctx.scale(-1, 1);
    }
    ctx.scale(SAILOR_DRAW_SCALE, SAILOR_DRAW_SCALE);

    const hair = PALETTE.hair;         // warm medium brown
    const hairShadow = shadeColor(hair, -26);
    const hairHighlight = shadeColor(hair, 26);
    const skin = '#ffd1b3';
    const outfit = PALETTE.outfit;
    const outfitShadow = shadeColor(outfit, -22);
    const outfitHighlight = shadeColor(outfit, 22);

    const walkOffset = sailor.isMoving ? Math.sin(Date.now() * 0.015) * 4 : 0;
    const pigtailSway = sailor.isMoving ? Math.sin(Date.now() * 0.012) * 2 : 0;

    // 1. Back of head: she faces up the beach, away from the viewer, so the
    // entire head is a plain block of hair - no face/eyes drawn on this
    // side. Crown highlight and nape-shadow keep the hair block to three
    // tones without adding any new detail that could muddy the silhouette.
    ctx.fillStyle = hair;
    ctx.fillRect(-9, -32, 18, 14);
    ctx.fillStyle = hairHighlight;
    ctx.fillRect(-9, -32, 18, 3);
    ctx.fillStyle = hairShadow;
    ctx.fillRect(-9, -20, 18, 2);

    // Small sliver of nape skin visible beneath the hair, above the collar
    ctx.fillStyle = skin;
    ctx.fillRect(-3, -18, 6, 6);

    // 2. Pigtails - two big, plain round bunches held clear of the head.
    // Adjusted raw pigtail offsets outwards by 2px to compensate for the smaller
    // SAILOR_DRAW_SCALE (0.74) and prevent the head-to-pigtail gap from collapsing.
    // Shadow stays confined to the underside/overlap area only, per the
    // pigtail-readability rule - never a full-shape darken.
    ctx.fillStyle = hair;
    ctx.fillRect(-25 + pigtailSway, -28, 10, 5);
    ctx.fillRect(-27 + pigtailSway, -23, 8, 6);
    ctx.fillRect(15 - pigtailSway, -28, 10, 5);
    ctx.fillRect(19 - pigtailSway, -23, 8, 6);

    ctx.fillStyle = hairShadow;
    ctx.fillRect(-27 + pigtailSway, -20, 8, 3);
    ctx.fillRect(19 - pigtailSway, -20, 8, 3);

    // 3. Outfit - plain blue dress, back view, base/shadow/highlight tones
    ctx.fillStyle = outfit;
    ctx.fillRect(-10, -11, 20, 15);
    ctx.fillStyle = outfitHighlight;
    ctx.fillRect(-10, -11, 20, 3);
    ctx.fillStyle = outfitShadow;
    ctx.fillRect(-10, 0, 20, 4);

    // 4. Arms (blue sleeves + skin hands)
    ctx.fillStyle = outfit;
    ctx.fillRect(-13, -10, 3, 8);
    ctx.fillRect(10, -10, 3, 8);
    ctx.fillStyle = skin;
    ctx.fillRect(-13, -2, 3, 3);
    ctx.fillRect(10, -2, 3, 3);

    // 5. Legs / Shoes (white socks + black shoes)
    ctx.fillStyle = '#ffffff'; // socks
    ctx.fillRect(-6, 4 + walkOffset / 2, 4, 4);
    ctx.fillRect(2, 4 - walkOffset / 2, 4, 4);

    ctx.fillStyle = '#222222'; // shoes
    ctx.fillRect(-7, 8 + walkOffset / 2, 5, 3);
    ctx.fillRect(1, 8 - walkOffset / 2, 5, 3);

    ctx.restore();
  }

  function drawBupa() {
    ctx.save();
    ctx.translate(Math.round(bupa.x / 2) * 2, Math.round(bupa.y / 2) * 2);

    if (bupa.facingLeft) {
      ctx.scale(-1, 1);
    }

    // Color definitions - fur base warmed to join the beach's warm family;
    // shadow/highlight are both derived from that one base tone. White
    // patch stays the one pure-white note (unchanged) per the visual
    // redesign brief's Bupa readability rule.
    const gray = PALETTE.bupaFur;
    const darkGray = shadeColor(gray, -30);
    const furHighlight = shadeColor(gray, 28);
    const white = '#f1f2f2';

    // Timers for personality behaviors
    const hasAffection = (bupa.sailorNearStillTimer >= 2.0);
    const isBlinking = hasAffection && (((bupa.sailorNearStillTimer - 2.0) % 3.0) < 0.6);
    const tailSway = Math.floor(Date.now() / 800) % 2 * 2;
    const earFlick = (Math.floor(Date.now() / 150) % 20 === 0) ? 2 : 0;

    // Bupa's state checks
    if (bupa.state === 'CHECK_BACK') {
      // --- Sitting, looking back (towards screen/Sailor) ---
      // Body (sitting upright)
      ctx.fillStyle = gray;
      ctx.fillRect(-8, -10, 16, 12);
      ctx.fillRect(-6, -14, 12, 4);
      
      // Cat feet (with white paws)
      ctx.fillStyle = darkGray;
      ctx.fillRect(-6, 2, 4, 4);
      ctx.fillRect(2, 2, 4, 4);
      ctx.fillStyle = white;
      ctx.fillRect(-6, 4, 4, 2);
      ctx.fillRect(2, 4, 4, 2);

      // Tail curled around (slight sway if sitting)
      ctx.fillStyle = darkGray;
      ctx.fillRect(-12 - tailSway, 2, 6, 4);

      // Head (facing back, so eyes looking down/sideways)
      ctx.fillStyle = gray;
      ctx.fillRect(-8, -22, 16, 10);
      ctx.fillStyle = furHighlight; // head-top highlight, third fur tone
      ctx.fillRect(-8, -22, 16, 2);

      // Ears (ear flick idle animation)
      ctx.fillStyle = darkGray;
      ctx.fillRect(-8, -26 + earFlick, 4, 4);
      ctx.fillRect(4, -26, 4, 4);

      // Eyes looking back (white + green)
      if (isBlinking) {
        // Slow blink / squint - draw closed eye line
        ctx.fillStyle = darkGray;
        ctx.fillRect(-4, -16, 2, 2);
        ctx.fillRect(2, -16, 2, 2);
      } else {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(-4, -18, 2, 4);
        ctx.fillRect(2, -18, 2, 4);
        ctx.fillStyle = '#7ac143'; // green pupil
        ctx.fillRect(-4, -18, 2, 2);
        ctx.fillRect(2, -18, 2, 2);
      }

      // White chest
      ctx.fillStyle = white;
      ctx.fillRect(-2, -10, 4, 6);

      // meow / worry cue - a plain chip, no gold border or trim
      if (bupa.meowTimer > 0) {
        ctx.scale(bupa.facingLeft ? -1 : 1, 1); // unflip text
        ctx.fillStyle = 'rgba(26, 28, 30, 0.85)';
        ctx.fillRect(-22, -44, 44, 14);

        ctx.fillStyle = '#f4edd2';
        ctx.font = 'bold 9px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('meow?', 0, -34);
      }
    } 
    else if (bupa.state === 'INVESTIGATING') {
      const target = interestPoints[bupa.currentTargetIdx];

      if (bupa.stateProgress < 0.4) {
        // --- STAGE 1: Standing sniff (Low head, sniffing interest point) ---
        // Tail
        ctx.fillStyle = darkGray;
        if (hasAffection) {
          ctx.fillRect(-10, -6, 4, 6); // Curled tail
        } else {
          ctx.fillRect(-14, -12 - tailSway, 6, 4); // Standing tail sway
        }
        
        // Body
        ctx.fillStyle = gray;
        ctx.fillRect(-8, -10, 16, 10);
        // Legs
        ctx.fillStyle = darkGray;
        ctx.fillRect(-6, -2, 4, 4);
        ctx.fillRect(2, -2, 4, 4);
        ctx.fillStyle = white; // white front paws
        ctx.fillRect(2, 2, 4, 2);
        
        // Head low
        ctx.fillStyle = gray;
        ctx.fillRect(6, -12, 10, 8);
        ctx.fillStyle = furHighlight;
        ctx.fillRect(6, -12, 10, 2);
        ctx.fillStyle = darkGray; // ears
        ctx.fillRect(8, -14, 2, 4);
        ctx.fillRect(12, -14 + earFlick, 2, 4);

        // Eye
        if (isBlinking) {
          ctx.fillStyle = darkGray;
          ctx.fillRect(10, -9, 2, 1);
        } else {
          ctx.fillStyle = '#7ac143'; // sniffing eye
          ctx.fillRect(10, -10, 2, 2);
        }
      }
      else if (bupa.stateProgress < 0.8) {
        // --- STAGE 2: CUSTOM INVESTIGATE PERFORMANCES ---
        if (target && target.type === 'tidepool') {
          // Tidepool: Bupa bats/paws at the water
          const batOffset = Math.floor(Date.now() / 150) % 2 * 2;
          
          // Tail
          ctx.fillStyle = darkGray;
          if (hasAffection) {
            ctx.fillRect(-10, -6, 4, 6);
          } else {
            ctx.fillRect(-14, -12 - tailSway, 6, 4);
          }

          // Body
          ctx.fillStyle = gray;
          ctx.fillRect(-8, -10, 16, 10);
          
          // Legs: stand on back legs + left front leg, bat with right front leg
          ctx.fillStyle = darkGray;
          ctx.fillRect(-6, -2, 4, 4);
          ctx.fillRect(2, -2, 4, 4);
          ctx.fillStyle = white;
          ctx.fillRect(2, 2, 4, 2); // left front paw on ground
          
          // Batting paw
          ctx.fillStyle = darkGray;
          ctx.fillRect(8, -2 - batOffset, 4, 4);
          ctx.fillStyle = white;
          ctx.fillRect(8, 2 - batOffset, 4, 2);

          // Head low
          ctx.fillStyle = gray;
          ctx.fillRect(6, -12, 10, 8);
          ctx.fillStyle = furHighlight;
          ctx.fillRect(6, -12, 10, 2);
          ctx.fillStyle = darkGray; // ears
          ctx.fillRect(8, -14 + earFlick, 2, 4);
          ctx.fillRect(12, -14, 2, 4);

          // Eye
          if (isBlinking) {
            ctx.fillStyle = darkGray;
            ctx.fillRect(10, -9, 2, 1);
          } else {
            ctx.fillStyle = '#7ac143';
            ctx.fillRect(10, -10, 2, 2);
          }
        } 
        else if (target && target.type === 'driftwood') {
          // Driftwood: Bupa scratches claws back and forth
          const scratchCycle = Math.floor(Date.now() / 100) % 2;
          const fastTail = Math.floor(Date.now() / 100) % 2 * 2;

          // Body stretched forward
          ctx.fillStyle = gray;
          ctx.fillRect(-10, -10, 18, 10);

          // Rear legs
          ctx.fillStyle = darkGray;
          ctx.fillRect(-8, -2, 4, 4);

          // Tail (rapid twitch)
          ctx.fillStyle = darkGray;
          if (hasAffection) {
            ctx.fillRect(-10, -6, 4, 6);
          } else {
            ctx.fillRect(-16, -12 - fastTail, 6, 4);
          }

          // Front legs scratching (alternating)
          ctx.fillStyle = darkGray;
          ctx.fillRect(4 + (scratchCycle * 2), -2, 4, 4);
          ctx.fillStyle = white;
          ctx.fillRect(4 + (scratchCycle * 2), 2, 4, 2);

          ctx.fillStyle = darkGray;
          ctx.fillRect(6 - (scratchCycle * 2), -2, 4, 4);
          ctx.fillStyle = white;
          ctx.fillRect(6 - (scratchCycle * 2), 2, 4, 2);

          // Head close
          ctx.fillStyle = gray;
          ctx.fillRect(8, -12, 10, 8);
          ctx.fillStyle = furHighlight;
          ctx.fillRect(8, -12, 10, 2);
          ctx.fillStyle = darkGray; // ears
          ctx.fillRect(10, -14, 2, 4);
          ctx.fillRect(14, -14 + earFlick, 2, 4);

          // Eye
          if (isBlinking) {
            ctx.fillStyle = darkGray;
            ctx.fillRect(12, -9, 2, 1);
          } else {
            ctx.fillStyle = '#7ac143';
            ctx.fillRect(12, -10, 2, 2);
          }
        } 
        else if (target && target.type === 'rock') {
          // Rock: Bupa noses/investigates (sitting, head bobbing)
          const bobOffset = Math.floor(Date.now() / 300) % 2 * 2;

          // Body (sitting)
          ctx.fillStyle = gray;
          ctx.fillRect(-8, -8, 14, 10);
          ctx.fillRect(-6, -12, 12, 6);

          // Legs
          ctx.fillStyle = darkGray;
          ctx.fillRect(-6, 2, 4, 4);
          ctx.fillRect(2, 2, 4, 4);
          ctx.fillStyle = white;
          ctx.fillRect(2, 4, 4, 2);

          // Tail
          ctx.fillStyle = darkGray;
          ctx.fillRect(-12, 0 - tailSway, 6, 4);

          // Head bobbing
          ctx.fillStyle = gray;
          ctx.fillRect(2, -18 + bobOffset, 10, 8);
          ctx.fillStyle = furHighlight;
          ctx.fillRect(2, -18 + bobOffset, 10, 2);
          ctx.fillStyle = darkGray; // ears
          ctx.fillRect(4, -22 + bobOffset + earFlick, 2, 4);
          ctx.fillRect(8, -22 + bobOffset, 2, 4);

          // Eye
          if (isBlinking) {
            ctx.fillStyle = darkGray;
            ctx.fillRect(6, -15 + bobOffset, 2, 1);
          } else {
            ctx.fillStyle = '#7ac143';
            ctx.fillRect(6, -16 + bobOffset, 2, 2);
          }
        } 
        else if (target && target.type === 'beachball') {
          // Beach ball: Bupa crouches and bats/paws at the ball.
          // Retargets the existing tidepool batting performance (one simple
          // beat) - no ball physics, no score, purely cosmetic.
          const batOffset = Math.floor(Date.now() / 150) % 2 * 2;

          // Tail
          ctx.fillStyle = darkGray;
          if (hasAffection) {
            ctx.fillRect(-10, -6, 4, 6);
          } else {
            ctx.fillRect(-14, -12 - tailSway, 6, 4);
          }

          // Body
          ctx.fillStyle = gray;
          ctx.fillRect(-8, -10, 16, 10);

          // Legs: stand on back legs + left front leg, bat with right front leg
          ctx.fillStyle = darkGray;
          ctx.fillRect(-6, -2, 4, 4);
          ctx.fillRect(2, -2, 4, 4);
          ctx.fillStyle = white;
          ctx.fillRect(2, 2, 4, 2); // left front paw on ground

          // Batting paw
          ctx.fillStyle = darkGray;
          ctx.fillRect(8, -2 - batOffset, 4, 4);
          ctx.fillStyle = white;
          ctx.fillRect(8, 2 - batOffset, 4, 2);

          // Head low
          ctx.fillStyle = gray;
          ctx.fillRect(6, -12, 10, 8);
          ctx.fillStyle = furHighlight;
          ctx.fillRect(6, -12, 10, 2);
          ctx.fillStyle = darkGray; // ears
          ctx.fillRect(8, -14 + earFlick, 2, 4);
          ctx.fillRect(12, -14, 2, 4);

          // Eye
          if (isBlinking) {
            ctx.fillStyle = darkGray;
            ctx.fillRect(10, -9, 2, 1);
          } else {
            ctx.fillStyle = '#7ac143';
            ctx.fillRect(10, -10, 2, 2);
          }
        }
        else if (target && target.type === 'umbrella') {
          // Umbrella: Bupa sits in the shade and slow-blinks (a "cat found
          // a shade patch" beat). Reuses the sitting silhouette; eyes
          // slow-blink closed on a slow cycle instead of the rock's head bob.
          const slowPhase = Math.sin(Date.now() / 1200);
          const blinkClose = slowPhase > 0.6; // slow-blink closed part of cycle

          // Body (sitting)
          ctx.fillStyle = gray;
          ctx.fillRect(-8, -8, 14, 10);
          ctx.fillRect(-6, -12, 12, 6);

          // Legs
          ctx.fillStyle = darkGray;
          ctx.fillRect(-6, 2, 4, 4);
          ctx.fillRect(2, 2, 4, 4);
          ctx.fillStyle = white;
          ctx.fillRect(2, 4, 4, 2);

          // Tail (calm, low sway)
          ctx.fillStyle = darkGray;
          ctx.fillRect(-12, 0 - tailSway, 6, 4);

          // Head (still, ears relaxed)
          ctx.fillStyle = gray;
          ctx.fillRect(2, -18, 10, 8);
          ctx.fillStyle = furHighlight;
          ctx.fillRect(2, -18, 10, 2);
          ctx.fillStyle = darkGray; // ears
          ctx.fillRect(4, -22 + earFlick, 2, 4);
          ctx.fillRect(8, -22, 2, 4);

          // Eye: slow-blink (closed when blinkClose, else half-open green)
          if (blinkClose || isBlinking) {
            ctx.fillStyle = darkGray;
            ctx.fillRect(6, -15, 2, 1);
          } else {
            ctx.fillStyle = '#7ac143';
            ctx.fillRect(6, -16, 2, 2);
          }
        }
        else {
          // Grass/Dune tuft or default: sniffs/peeks crouched low
          // Body
          ctx.fillStyle = gray;
          ctx.fillRect(-8, -8, 16, 8);

          // Legs
          ctx.fillStyle = darkGray;
          ctx.fillRect(-6, 0, 4, 4);
          ctx.fillRect(2, 0, 4, 4);
          ctx.fillStyle = white;
          ctx.fillRect(2, 2, 4, 2);

          // Tail
          ctx.fillStyle = darkGray;
          ctx.fillRect(-14, -6 - tailSway, 6, 4);

          // Head low peeking
          ctx.fillStyle = gray;
          ctx.fillRect(4, -14, 10, 8);
          ctx.fillStyle = furHighlight;
          ctx.fillRect(4, -14, 10, 2);
          ctx.fillStyle = darkGray; // ears
          ctx.fillRect(6, -16 + earFlick, 2, 4);
          ctx.fillRect(10, -16, 2, 4);

          // Eye
          if (isBlinking) {
            ctx.fillStyle = darkGray;
            ctx.fillRect(8, -11, 2, 1);
          } else {
            ctx.fillStyle = '#7ac143';
            ctx.fillRect(8, -12, 2, 2);
          }
        }
      } 
      else {
        // --- STAGE 3: About to leave (standing alert, tail wagging) ---
        // Tail wag animation
        const tailOffset = Math.floor(Date.now() / 150) % 2 * 2;
        ctx.fillStyle = darkGray;
        if (hasAffection) {
          ctx.fillRect(-10, -6, 4, 6);
        } else {
          ctx.fillRect(-14, -12 - tailOffset, 6, 4);
        }
        
        // Body
        ctx.fillStyle = gray;
        ctx.fillRect(-8, -12, 16, 10);
        // Legs
        ctx.fillStyle = darkGray;
        ctx.fillRect(-6, -4, 4, 6);
        ctx.fillRect(4, -4, 4, 6);
        ctx.fillStyle = white;
        ctx.fillRect(4, 2, 4, 2);

        // Head high & alert
        ctx.fillStyle = gray;
        ctx.fillRect(4, -20, 10, 8);
        ctx.fillStyle = furHighlight;
        ctx.fillRect(4, -20, 10, 2);
        ctx.fillStyle = darkGray; // ears
        ctx.fillRect(6, -22, 2, 4);
        ctx.fillRect(10, -22 + earFlick, 2, 4);
        
        // Eye
        if (isBlinking) {
          ctx.fillStyle = darkGray;
          ctx.fillRect(8, -15, 2, 1);
        } else {
          ctx.fillStyle = '#7ac143'; // eye
          ctx.fillRect(8, -16, 2, 2);
        }
      }
    } 
    else {
      // --- TROTTING ---
      const walkCycle = Math.round(Math.sin(Date.now() * 0.02)) * 2;
      
      // Tail
      ctx.fillStyle = darkGray;
      if (hasAffection) {
        ctx.fillRect(-10, -6, 4, 6);
      } else {
        ctx.fillRect(-14, -12, 6, 4);
      }
      
      // Body
      ctx.fillStyle = gray;
      ctx.fillRect(-8, -12, 16, 10);

      // Legs trotting animation
      ctx.fillStyle = darkGray;
      ctx.fillRect(-6, -4 + walkCycle, 4, 6);
      ctx.fillRect(4, -4 - walkCycle, 4, 6);
      ctx.fillStyle = white; // white front paw
      ctx.fillRect(4, 2 - walkCycle, 4, 2);

      // Head
      ctx.fillStyle = gray;
      ctx.fillRect(4, -18, 10, 8);
      ctx.fillStyle = furHighlight;
      ctx.fillRect(4, -18, 10, 2);
      ctx.fillStyle = darkGray; // ears
      ctx.fillRect(6, -22, 2, 4);
      ctx.fillRect(10, -22, 2, 4);
      
      // Eye
      if (isBlinking) {
        ctx.fillStyle = darkGray;
        ctx.fillRect(8, -15, 2, 1);
      } else {
        ctx.fillStyle = '#7ac143'; // eye
        ctx.fillRect(8, -16, 2, 2);
      }
    }

    // Draw reunion meow chip if active ("mrrp!")
    if (bupa.reunionTimer > 0) {
      ctx.save();
      ctx.scale(bupa.facingLeft ? -1 : 1, 1); // unflip text
      ctx.fillStyle = 'rgba(26, 28, 30, 0.85)';
      ctx.fillRect(-22, -44, 44, 14);

      ctx.fillStyle = '#f4edd2';
      ctx.font = 'bold 9px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText('mrrp!', 0, -34);
      ctx.restore();
    }

    ctx.restore();
  }

  function spawnCrab() {
    if (crabs.length >= 1) return;

    const viewTop = cameraY + 50;
    const viewBottom = cameraY + 550;

    let spawnNearFoam = Math.random() < 0.5;
    let x = 0;
    let y = 0;

    if (!spawnNearFoam) {
      const onScreenRocks = interestPoints.filter(ip => ip.type === 'rock' && ip.y >= viewTop && ip.y <= viewBottom);
      if (onScreenRocks.length > 0) {
        const rock = onScreenRocks[Math.floor(Math.random() * onScreenRocks.length)];
        x = rock.x + (Math.random() < 0.5 ? -25 : 25);
        y = rock.y + (Math.random() - 0.5) * 15;
      } else {
        spawnNearFoam = true;
      }
    }

    if (spawnNearFoam) {
      x = 150 + 10 + Math.random() * 20;
      y = viewTop + Math.random() * (viewBottom - viewTop);
    }

    crabs.push({
      x: x,
      y: y,
      startX: x,
      startY: y,
      targetX: x + (Math.random() < 0.5 ? -40 : 40) + (Math.random() - 0.5) * 10,
      targetY: y + (Math.random() - 0.5) * 15,
      timer: 0,
      duration: 3.5,
      facingLeft: false,
      state: 'EMERGING'
    });
  }

  function triggerShellSparkle() {
    const viewTop = cameraY;
    const viewBottom = cameraY + 600;
    const visibleShells = shells.filter(s => !s.collected && !s.missed && s.y >= viewTop && s.y <= viewBottom);
    if (visibleShells.length === 0) return;

    const shell = visibleShells[Math.floor(Math.random() * visibleShells.length)];
    particles.push({
      x: shell.x + (Math.random() - 0.5) * 6,
      y: shell.y - 2 + (Math.random() - 0.5) * 4,
      vx: 0,
      vy: 0,
      alpha: 1.0,
      color: '#ffffff',
      size: 2,
      isGlint: true
    });
  }

  function drawCrab(crab) {
    ctx.save();
    ctx.translate(crab.x, crab.y);
    
    let yOffset = 0;
    if (crab.state === 'EMERGING') {
      yOffset = Math.max(0, (0.5 - crab.timer) / 0.5 * 6);
    } else if (crab.state === 'BURROWING') {
      yOffset = Math.max(0, (crab.timer - 3.0) / 0.5 * 6);
    }
    
    if (yOffset > 0) {
      ctx.fillStyle = PALETTE.sandGrain;
      ctx.fillRect(-5, 2, 10, 2);
    }

    ctx.translate(0, yOffset);

    if (crab.facingLeft) {
      ctx.scale(-1, 1);
    }

    if (crab.state === 'SCUTTLING') {
      drawGroundShadow(0, 3, 5, 2);
    }

    const red = '#d95c50';
    const darkRed = '#a63c32';
    const scuttle = Math.floor(Date.now() / 80) % 2;

    ctx.fillStyle = darkRed;
    if (scuttle === 0) {
      ctx.fillRect(-5, -1, 2, 1);
      ctx.fillRect(-4, 1, 2, 1);
      ctx.fillRect(-5, 3, 2, 1);
      
      ctx.fillRect(3, -1, 2, 1);
      ctx.fillRect(2, 1, 2, 1);
      ctx.fillRect(3, 3, 2, 1);
    } else {
      ctx.fillRect(-4, -2, 2, 1);
      ctx.fillRect(-5, 0, 2, 1);
      ctx.fillRect(-4, 2, 2, 1);

      ctx.fillRect(2, -2, 2, 1);
      ctx.fillRect(3, 0, 2, 1);
      ctx.fillRect(2, 2, 2, 1);
    }

    ctx.fillStyle = red;
    ctx.fillRect(-3, -2, 6, 4);
    
    ctx.fillStyle = red;
    ctx.fillRect(-4, -4, 2, 2);
    ctx.fillRect(2, -4, 2, 2);
    ctx.fillStyle = darkRed;
    ctx.fillRect(-3, -3, 1, 1);
    ctx.fillRect(2, -3, 1, 1);

    ctx.fillStyle = '#1a1c1e';
    ctx.fillRect(-2, -3, 1, 1);
    ctx.fillRect(1, -3, 1, 1);

    ctx.restore();
  }

  // Start initialization
  resetGame();
  requestAnimationFrame(gameTick);
</script>
