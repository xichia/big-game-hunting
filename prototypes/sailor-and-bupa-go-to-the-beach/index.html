<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sailor and Bupa: Go to the Beach</title>
  <style>
    /* Premium visual styling and reset */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background-color: #1a1c1e;
      color: #e2e2e6;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    #game-container {
      position: relative;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      border-radius: 12px;
      overflow: hidden;
      border: 4px solid #3c3f41;
      background-color: #2b2d2f;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    .hud {
      position: absolute;
      top: 16px;
      left: 16px;
      pointer-events: none;
      background: rgba(26, 28, 30, 0.85);
      backdrop-filter: blur(4px);
      padding: 12px 18px;
      border-radius: 8px;
      border: 2px solid #5a5d60;
      color: #f4edd2;
      font-size: 14px;
      line-height: 1.5;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    .hud-title {
      font-weight: bold;
      color: #e3a857;
      margin-bottom: 6px;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 1px;
    }
    .hud-line {
      display: flex;
      justify-content: space-between;
      gap: 20px;
    }
    .debug-panel {
      position: absolute;
      bottom: 16px;
      left: 16px;
      pointer-events: none;
      background: rgba(26, 28, 30, 0.7);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 11px;
      color: #8c9094;
      border: 1px solid #444;
    }
    .restart-hint {
      position: absolute;
      bottom: 16px;
      right: 16px;
      background: rgba(26, 28, 30, 0.85);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      color: #e3a857;
      border: 1px solid #5a5d60;
    }
    /* Overlay for End of Game and Start Screen */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(18, 20, 22, 0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #f4edd2;
      padding: 40px;
      text-align: center;
      transition: opacity 0.3s ease;
    }
    .overlay.hidden {
      display: none;
    }
    .overlay h1 {
      font-size: 28px;
      color: #e3a857;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .overlay p {
      font-size: 16px;
      margin-bottom: 24px;
      line-height: 1.6;
      max-width: 500px;
    }
    .btn {
      background-color: #e3a857;
      color: #1a1c1e;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      font-family: inherit;
      font-weight: bold;
      cursor: pointer;
      border-radius: 6px;
      box-shadow: 0 4px 10px rgba(227, 168, 87, 0.3);
      transition: all 0.2s;
    }
    .btn:hover {
      background-color: #f1be7a;
      transform: translateY(-2px);
    }
    .btn:active {
      transform: translateY(0);
    }
    .results-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 30px;
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 8px;
      border: 1px solid #444;
      width: 100%;
      max-width: 400px;
    }
    .result-val {
      font-size: 20px;
      font-weight: bold;
      color: #e3a857;
    }
  </style>
</head>
<body>

<div id="game-container">
  <canvas id="gameCanvas" width="800" height="600"></canvas>
  
  <!-- HUD display -->
  <div class="hud">
    <div class="hud-title">Beach Walk</div>
    <div class="hud-line"><span>Shells Collected:</span><span id="score-collected" style="color: #e3a857; font-weight: bold;">0</span></div>
    <div class="hud-line"><span>Shells Missed:</span><span id="score-missed" style="color: #c95c5c;">0</span></div>
  </div>

  <!-- Debug info -->
  <div class="debug-panel" id="debug-panel">
    Bupa state: -- | Dist: --
  </div>

  <!-- Restart cue -->
  <div class="restart-hint">
    Press [R] to Restart
  </div>

  <!-- End Game Overlay -->
  <div id="end-overlay" class="overlay hidden">
    <h1 id="end-title">Beach Walk Complete</h1>
    <p id="end-message">Bupa has finished investigating the beach! You stayed by his side and walked together.</p>
    <div class="results-grid">
      <div>
        <div style="font-size: 12px; color: #8c9094; text-transform: uppercase;">Collected</div>
        <div class="result-val" id="final-collected">0</div>
      </div>
      <div>
        <div style="font-size: 12px; color: #8c9094; text-transform: uppercase;">Forfeited</div>
        <div class="result-val" id="final-missed">0</div>
      </div>
    </div>
    <button class="btn" onclick="resetGame()">Walk Again</button>
  </div>
</div>

<script>
  // --- CONFIGURABLE CONSTANTS (Exposed at the top for easy tuning) ---
  const CONFIG = {
    SAILOR_SPEED: 180,           // Sailor movement speed (pixels/sec)
    BUPA_TROTTING_SPEED: 75,     // Bupa standard walk speed (pixels/sec)
    COMFORT_RADIUS: 240,         // Distance Sailor can stray before Bupa sits & waits
    REASSURE_RADIUS: 140,        // Distance Sailor must return to for Bupa to resume trotting
    
    // Pause duration configurations per interest point type (min duration, max duration)
    PAUSE_DURATIONS: {
      rock: { min: 2.0, max: 4.0 },       // Short pause
      driftwood: { min: 4.5, max: 6.5 },   // Medium pause
      tidepool: { min: 8.0, max: 11.0 }    // Long pause
    },

    // Camera follow speed interpolation coefficient
    CAMERA_LERP: 0.08,
    
    // Total number of interest point stops Bupa will make
    TOTAL_STOPS: 10
  };

  const canvas = document.getElementById('gameCanvas');
  const displayCtx = canvas.getContext('2d');

  // All game-world drawing happens on this half-resolution offscreen buffer,
  // then gets blitted up with nearest-neighbor scaling. Rendering everything
  // through one shared low-res buffer is what keeps sand, water, shells,
  // Sailor and Bupa on a single consistent pixel scale instead of looking
  // like smooth canvas primitives with pixel details bolted on.
  const PIXEL_SCALE = 0.5;
  const pixelCanvas = document.createElement('canvas');
  pixelCanvas.width = canvas.width * PIXEL_SCALE;
  pixelCanvas.height = canvas.height * PIXEL_SCALE;
  const ctx = pixelCanvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  displayCtx.imageSmoothingEnabled = false;

  // Input system
  const keys = {};
  window.addEventListener('keydown', (e) => {
    keys[e.code] = true;
    if (e.code === 'KeyR') {
      resetGame();
    }
  });
  window.addEventListener('keyup', (e) => {
    keys[e.code] = false;
  });

  // Game state variables
  let sailor = { x: 400, y: 400, vx: 0, vy: 0, width: 22, height: 32, facingLeft: false, isMoving: false };
  let bupa = { 
    x: 400, 
    y: 480, 
    vx: 0, 
    vy: 0, 
    width: 20, 
    height: 14, 
    state: 'TROTTING', // TROTTING, INVESTIGATING, CHECK_BACK
    currentTargetIdx: 0,
    pauseTimer: 0,
    pauseDuration: 0,
    facingLeft: false,
    meowTimer: 0,
    stateProgress: 0 // 0.0 to 1.0 within INVESTIGATING state
  };

  let cameraY = 150; // offset
  let shellsCollected = 0;
  let shellsMissed = 0;
  let interestPoints = [];
  let shells = [];
  let particles = [];
  let isGameOver = false;

  // Initialize interest point configurations & types
  const INTEREST_POINT_TYPES = [
    { type: 'rock', color: '#7a7d80', label: 'Rock Pile' },
    { type: 'driftwood', color: '#9c6f44', label: 'Driftwood' },
    { type: 'tidepool', color: '#4d8dbf', label: 'Tidepool' }
  ];

  // Shell colors kept clear of the dry-sand tone (#f0e3c5) so shells stay
  // visible at a glance instead of blending into the ground.
  const SHELL_COLORS = ['#e8a9a0', '#c9b8d9', '#fdf7ec', '#f2c14e', '#8fb9c9'];

  function generateLevel() {
    interestPoints = [];
    shells = [];
    particles = [];
    
    // Spawn starting interest point at starting Y
    let currentY = 320;
    
    // Generate 10 interest points scaling upward (decreasing Y)
    for (let i = 0; i < CONFIG.TOTAL_STOPS; i++) {
      currentY -= 350 + Math.random() * 100;
      // Keep x within sandy beach boundaries (between X=280 and X=600)
      let x = 280 + Math.random() * 260;
      
      // Cycle or choose type
      let typeData;
      if (i % 3 === 0) {
        typeData = INTEREST_POINT_TYPES[0]; // rock
      } else if (i % 3 === 1) {
        typeData = INTEREST_POINT_TYPES[1]; // driftwood
      } else {
        typeData = INTEREST_POINT_TYPES[2]; // tidepool
      }
      
      interestPoints.push({
        x: x,
        y: currentY,
        type: typeData.type,
        color: typeData.color,
        label: typeData.label,
        visited: false
      });

      // Spawn shells surrounding the interest point or to the sides of the path
      // Some shells close, some far away (to lure Sailor away into dunes or tide wet sand)
      let numShells = 3 + Math.floor(Math.random() * 3);
      for (let s = 0; s < numShells; s++) {
        let shellX, shellY;
        if (Math.random() < 0.4) {
          // Close shell
          shellX = x + (Math.random() - 0.5) * 140;
          shellY = currentY + (Math.random() - 0.5) * 140;
        } else {
          // Far shell (towards dunes or wet sand)
          let side = Math.random() < 0.5 ? 1 : -1;
          shellX = x + side * (160 + Math.random() * 120);
          shellY = currentY + (Math.random() - 0.5) * 200;
        }
        
        // Clamp to beach width
        shellX = Math.max(160, Math.min(740, shellX));

        shells.push({
          x: shellX,
          y: shellY,
          collected: false,
          missed: false,
          color: SHELL_COLORS[Math.floor(Math.random() * SHELL_COLORS.length)],
          // Cosmetic silhouette variant only (fan/scallop, spiral, clam-arc) -
          // no rarity or mechanical difference between shapes.
          shapeType: Math.floor(Math.random() * 3),
          size: 7 + Math.random() * 4
        });
      }
    }

    // A few extra shells scattered near Sailor's starting position so the
    // opening view shows beach content immediately, rather than bare sand
    // for the ~500px walk up to the first interest point. Same shell object
    // shape as above - no change to collection/forfeit rules.
    for (let s = 0; s < 4; s++) {
      shells.push({
        x: 260 + Math.random() * 360,
        y: 340 + Math.random() * 140,
        collected: false,
        missed: false,
        color: SHELL_COLORS[Math.floor(Math.random() * SHELL_COLORS.length)],
        shapeType: Math.floor(Math.random() * 3),
        size: 7 + Math.random() * 4
      });
    }
  }

  function resetGame() {
    isGameOver = false;
    shellsCollected = 0;
    shellsMissed = 0;
    document.getElementById('score-collected').innerText = '0';
    document.getElementById('score-missed').innerText = '0';
    document.getElementById('end-overlay').classList.add('hidden');

    sailor = { x: 400, y: 400, vx: 0, vy: 0, width: 22, height: 32, facingLeft: false, isMoving: false };
    bupa = { 
      x: 400, 
      y: 480, 
      vx: 0, 
      vy: 0, 
      state: 'TROTTING',
      currentTargetIdx: 0,
      pauseTimer: 0,
      pauseDuration: 0,
      facingLeft: false,
      meowTimer: 0,
      stateProgress: 0
    };
    cameraY = sailor.y - 400;

    generateLevel();
  }

  // --- GAMEPLAY LOOPS ---
  let lastTime = 0;
  function gameTick(time) {
    if (!lastTime) lastTime = time;
    let dt = (time - lastTime) / 1000;
    // Cap dt to prevent massive jumps when switching tabs
    if (dt > 0.1) dt = 0.1;

    update(dt);
    draw();

    lastTime = time;
    requestAnimationFrame(gameTick);
  }

  function update(dt) {
    if (isGameOver) return;

    // --- SAILOR CONTROLS & PHYSICS ---
    sailor.vx = 0;
    sailor.vy = 0;
    sailor.isMoving = false;

    if (keys['ArrowUp'] || keys['KeyW']) { sailor.vy = -CONFIG.SAILOR_SPEED; sailor.isMoving = true; }
    if (keys['ArrowDown'] || keys['KeyS']) { sailor.vy = CONFIG.SAILOR_SPEED; sailor.isMoving = true; }
    if (keys['ArrowLeft'] || keys['KeyA']) { sailor.vx = -CONFIG.SAILOR_SPEED; sailor.facingLeft = true; sailor.isMoving = true; }
    if (keys['ArrowRight'] || keys['KeyD']) { sailor.vx = CONFIG.SAILOR_SPEED; sailor.facingLeft = false; sailor.isMoving = true; }

    sailor.x += sailor.vx * dt;
    sailor.y += sailor.vy * dt;

    // Constrain Sailor to beach boundaries (X = 140 is waterline boundary, X = 740 is dry dunes boundary)
    if (sailor.x < 140) sailor.x = 140;
    if (sailor.x > 740) sailor.x = 740;

    // --- BUPA DECISION ENGINE / STATE MACHINE ---
    const target = interestPoints[bupa.currentTargetIdx];
    const dx = sailor.x - bupa.x;
    const dy = sailor.y - bupa.y;
    const distanceToSailor = Math.sqrt(dx * dx + dy * dy);

    if (bupa.meowTimer > 0) {
      bupa.meowTimer -= dt;
    }

    if (bupa.state === 'TROTTING') {
      if (target) {
        // Move towards current target interest point
        const bdx = target.x - bupa.x;
        const bdy = target.y - bupa.y;
        const distToTarget = Math.sqrt(bdx * bdx + bdy * bdy);
        
        bupa.facingLeft = bdx < 0;

        if (distToTarget < 10) {
          // Arrived at interest point! Transition to investigating
          bupa.state = 'INVESTIGATING';
          target.visited = true;
          const range = CONFIG.PAUSE_DURATIONS[target.type];
          bupa.pauseDuration = range.min + Math.random() * (range.max - range.min);
          bupa.pauseTimer = bupa.pauseDuration;
          bupa.vx = 0;
          bupa.vy = 0;
        } else {
          // Check proximity constraint
          if (distanceToSailor > CONFIG.COMFORT_RADIUS) {
            // Sailor is too far! Trigger check-back sitting state
            bupa.state = 'CHECK_BACK';
            bupa.vx = 0;
            bupa.vy = 0;
            bupa.meowTimer = 1.8; // Show "?" or "meow" bubble for 1.8s
          } else {
            // Trotting ahead
            bupa.vx = (bdx / distToTarget) * CONFIG.BUPA_TROTTING_SPEED;
            bupa.vy = (bdy / distToTarget) * CONFIG.BUPA_TROTTING_SPEED;
            bupa.x += bupa.vx * dt;
            bupa.y += bupa.vy * dt;
          }
        }
      } else {
        // No more targets -> finished walking!
        triggerGameOver();
      }
    } 
    else if (bupa.state === 'CHECK_BACK') {
      // Waiting for Sailor to catch up
      bupa.vx = 0;
      bupa.vy = 0;
      
      // Face Sailor
      bupa.facingLeft = (sailor.x < bupa.x);

      // Transition back when close enough
      if (distanceToSailor <= CONFIG.REASSURE_RADIUS) {
        bupa.state = 'TROTTING';
      }
    } 
    else if (bupa.state === 'INVESTIGATING') {
      bupa.vx = 0;
      bupa.vy = 0;
      bupa.pauseTimer -= dt;
      bupa.stateProgress = 1.0 - (bupa.pauseTimer / bupa.pauseDuration);

      if (bupa.pauseTimer <= 0) {
        // Move to next interest point
        bupa.currentTargetIdx++;
        if (bupa.currentTargetIdx >= interestPoints.length) {
          triggerGameOver();
        } else {
          bupa.state = 'TROTTING';
        }
      }
    }

    // --- CAMERA SCROLLING ---
    // Camera Y smoothly targets Bupa's position minus a comfortable vertical offset
    const targetCameraY = bupa.y - 360;
    cameraY += (targetCameraY - cameraY) * CONFIG.CAMERA_LERP;

    // Constrain camera scrolling to not show below start or go too high too early
    if (cameraY > 200) cameraY = 200;

    // --- SHELL COLLECTION & SCARCITY ---
    const cameraBottom = cameraY + 600;
    
    for (let shell of shells) {
      if (!shell.collected && !shell.missed) {
        // Check collision with Sailor
        const sdx = sailor.x - shell.x;
        const sdy = sailor.y - shell.y;
        const dist = Math.sqrt(sdx * sdx + sdy * sdy);
        
        if (dist < 22) {
          shell.collected = true;
          shellsCollected++;
          document.getElementById('score-collected').innerText = shellsCollected;
          // Spawn little splash particles
          spawnCollectParticles(shell.x, shell.y, shell.color);
        }
        
        // Check if shell went off-screen behind camera
        if (shell.y > cameraBottom) {
          shell.missed = true;
          shellsMissed++;
          document.getElementById('score-missed').innerText = shellsMissed;
        }
      }
    }

    // Sailor bounds relative to camera (don't let Sailor fall completely off bottom of screen)
    if (sailor.y > cameraBottom - 20) {
      sailor.y = cameraBottom - 20;
    }
    // Also limit top of screen so Sailor doesn't wander off-camera top
    if (sailor.y < cameraY + 20) {
      sailor.y = cameraY + 20;
    }

    // Update particles
    for (let p of particles) {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.alpha -= dt * 1.5;
    }
    particles = particles.filter(p => p.alpha > 0);

    // Update HUD/Debug panel
    const distText = Math.round(distanceToSailor);
    document.getElementById('debug-panel').innerHTML = 
      `Bupa: ${bupa.state} | Dist: ${distText}px | Stop: ${bupa.currentTargetIdx + 1}/${CONFIG.TOTAL_STOPS}`;
  }

  function spawnCollectParticles(x, y, color) {
    for (let i = 0; i < 8; i++) {
      let angle = Math.random() * Math.PI * 2;
      let speed = 40 + Math.random() * 60;
      particles.push({
        x: x,
        y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        alpha: 1.0,
        color: color,
        size: 2 + Math.random() * 2
      });
    }
  }

  function triggerGameOver() {
    isGameOver = true;
    document.getElementById('final-collected').innerText = shellsCollected;
    document.getElementById('final-missed').innerText = shellsMissed;
    document.getElementById('end-overlay').classList.remove('hidden');
  }

  // --- VISUAL HELPERS (texture, shading, shells, shadows) ---

  // Deterministic scatter points inside one repeating tile, expressed as
  // fractions (0..1) of the tile so the same field can be reused at
  // different tile sizes for different surfaces.
  const DRY_SAND_SPECKLES = [
    { dx: 0.10, dy: 0.20, size: 2 }, { dx: 0.42, dy: 0.10, size: 1 },
    { dx: 0.72, dy: 0.35, size: 2 }, { dx: 0.25, dy: 0.62, size: 1 },
    { dx: 0.86, dy: 0.55, size: 2 }, { dx: 0.55, dy: 0.80, size: 1 },
    { dx: 0.05, dy: 0.85, size: 2 }, { dx: 0.92, dy: 0.15, size: 1 }
  ];
  const DRY_SAND_SPECKLES_LIGHT = [
    { dx: 0.28, dy: 0.35, size: 1 }, { dx: 0.60, dy: 0.65, size: 2 },
    { dx: 0.15, dy: 0.50, size: 1 }, { dx: 0.80, dy: 0.85, size: 1 }
  ];
  const WET_SAND_DAPPLES = [
    { dx: 0.15, dy: 0.20, size: 2 }, { dx: 0.50, dy: 0.40, size: 3 },
    { dx: 0.80, dy: 0.15, size: 2 }, { dx: 0.30, dy: 0.70, size: 2 },
    { dx: 0.65, dy: 0.75, size: 3 }
  ];
  const OCEAN_SPARKLES = [
    { dx: 0.20, dy: 0.30, size: 2 }, { dx: 0.60, dy: 0.15, size: 2 },
    { dx: 0.40, dy: 0.70, size: 2 }, { dx: 0.80, dy: 0.55, size: 2 }
  ];

  // Scatters a fixed speckle field across a region by repeating one small
  // tile, rather than re-rolling randomness every frame (which would flicker).
  function drawSpeckleField(x0, x1, yTop, yBottom, tileSize, speckles, color) {
    const colStart = Math.floor(x0 / tileSize);
    const colEnd = Math.floor(x1 / tileSize);
    const rowStart = Math.floor(yTop / tileSize);
    const rowEnd = Math.floor(yBottom / tileSize);
    ctx.fillStyle = color;
    for (let row = rowStart; row <= rowEnd; row++) {
      for (let col = colStart; col <= colEnd; col++) {
        for (let sp of speckles) {
          const wx = col * tileSize + sp.dx * tileSize;
          const wy = row * tileSize + sp.dy * tileSize;
          if (wx >= x0 && wx <= x1) {
            ctx.fillRect(Math.floor(wx), Math.floor(wy), sp.size, sp.size);
          }
        }
      }
    }
  }

  // Deterministic 0..1 hash for a tile coordinate, used to break up terrain
  // shading so it reads as weathered ground rather than a repeating checker.
  function tileHash(row, col) {
    const v = Math.sin(row * 12.9898 + col * 78.233) * 43758.5453;
    return v - Math.floor(v);
  }

  // Faint tile-to-tile tone variation, sparsely applied so it reads as
  // subtle terrain wear rather than a floor-tile checkerboard.
  function drawTileShading(x0, x1, yTop, yBottom, tileSize, colorA, colorB) {
    const colStart = Math.floor(x0 / tileSize);
    const colEnd = Math.floor(x1 / tileSize);
    const rowStart = Math.floor(yTop / tileSize);
    const rowEnd = Math.floor(yBottom / tileSize);
    ctx.save();
    ctx.globalAlpha = 0.45;
    ctx.fillStyle = colorB;
    for (let row = rowStart; row <= rowEnd; row++) {
      for (let col = colStart; col <= colEnd; col++) {
        if (tileHash(row, col) > 0.6) continue;
        const wx = Math.max(x0, col * tileSize);
        const ww = Math.min(x1, (col + 1) * tileSize) - wx;
        if (ww <= 0) continue;
        ctx.fillRect(wx, row * tileSize, ww, tileSize);
      }
    }
    ctx.restore();
  }

  // Horizontal wave bands for the ocean, two alternating blue tones.
  function drawOceanBands(x0, x1, yTop, yBottom) {
    const bandH = 14;
    const rowStart = Math.floor(yTop / bandH);
    const rowEnd = Math.floor(yBottom / bandH);
    for (let row = rowStart; row <= rowEnd; row++) {
      ctx.fillStyle = row % 2 === 0 ? '#5b9db3' : '#6bb0c6';
      ctx.fillRect(x0, row * bandH, x1 - x0, bandH);
    }
  }

  // Blocky, stepped foam edge along the shoreline (in place of a smooth
  // sine-wave curve) so the coastline reads as pixel art, not a vector path.
  function drawShoreFoam(boundaryX, yTop, yBottom) {
    const step = 16;
    const rowStart = Math.floor(yTop / step);
    const rowEnd = Math.floor(yBottom / step);
    const t = performance.now() * 0.0006;
    ctx.fillStyle = '#eaf6f7';
    for (let row = rowStart; row <= rowEnd; row++) {
      const wobble = Math.round(Math.sin(row * 0.6 + t) * 2) * 4;
      ctx.fillRect(boundaryX - 6 + wobble, row * step, 12, step - 4);
    }
    ctx.fillStyle = '#ffffff';
    for (let row = rowStart; row <= rowEnd; row += 2) {
      const wobble = Math.round(Math.sin(row * 0.6 + t) * 2) * 4;
      ctx.fillRect(boundaryX - 3 + wobble, row * step, 4, 3);
    }
  }

  // Soft grounding shadow used under every game-world object for a
  // consistent shadow rule across characters, shells, and terrain features.
  function drawGroundShadow(x, y, radiusX, radiusY) {
    ctx.save();
    ctx.globalAlpha = 0.22;
    ctx.fillStyle = '#1a1c1e';
    ctx.beginPath();
    ctx.ellipse(x, y, radiusX, radiusY, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function shadeColor(hex, amount) {
    const num = parseInt(hex.slice(1), 16);
    let r = (num >> 16) + amount;
    let g = ((num >> 8) & 0xff) + amount;
    let b = (num & 0xff) + amount;
    r = Math.max(0, Math.min(255, r));
    g = Math.max(0, Math.min(255, g));
    b = Math.max(0, Math.min(255, b));
    return '#' + (0x1000000 + r * 0x10000 + g * 0x100 + b).toString(16).slice(1);
  }

  // Shell silhouettes: fan/scallop, spiral/conch, and clam-arc. Purely a
  // cosmetic pick (shell.shapeType) - no rarity or gameplay difference.
  function drawShellShape(shell) {
    const s = shell.size;
    const color = shell.color;
    const dark = shadeColor(color, -55);
    const outline = '#7a6a52';
    // The whole scene renders through a half-scale pixel buffer (see
    // PIXEL_SCALE), so hairline strokes need to be drawn thicker here or
    // they anti-alias away to nothing once downscaled.
    const OUTLINE_LW = 2.5;
    const RIDGE_LW = 2;

    ctx.save();
    ctx.translate(shell.x, shell.y);

    if (shell.shapeType === 0) {
      // Fan / scallop shell - hinge at the BOTTOM with the fan spreading
      // upward (the iconic scallop read), not apex-up like a cone/teepee.
      ctx.beginPath();
      ctx.moveTo(0, s);
      ctx.lineTo(-s * 0.95, -s * 0.55);
      ctx.quadraticCurveTo(-s * 0.5, -s * 0.95, -s * 0.25, -s * 0.7);
      ctx.quadraticCurveTo(0, -s * 1.05, s * 0.25, -s * 0.7);
      ctx.quadraticCurveTo(s * 0.5, -s * 0.95, s * 0.95, -s * 0.55);
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();
      ctx.lineWidth = OUTLINE_LW;
      ctx.strokeStyle = outline;
      ctx.stroke();
      // Ridges start partway up from the hinge rather than at the hinge
      // itself, so they fan out as distinct lines instead of converging
      // into one solid dark wedge at small gameplay scale.
      ctx.lineWidth = RIDGE_LW;
      ctx.strokeStyle = dark;
      for (let i = -3; i <= 3; i++) {
        if (i === 0) continue;
        ctx.beginPath();
        ctx.moveTo(i * s * 0.08, s * 0.55);
        ctx.lineTo(i * s * 0.32, -s * 0.75);
        ctx.stroke();
      }
    } else if (shell.shapeType === 1) {
      // Spiral / conch shell - a pointed teardrop body (not a plain oval,
      // which reads as a pebble) with a bold outline-colored coil so the
      // spiral stays visible at small gameplay scale.
      ctx.beginPath();
      ctx.moveTo(0, -s * 1.1);
      ctx.quadraticCurveTo(s * 0.65, -s * 0.6, s * 0.55, s * 0.15);
      ctx.quadraticCurveTo(s * 0.45, s * 0.9, 0, s * 0.95);
      ctx.quadraticCurveTo(-s * 0.45, s * 0.9, -s * 0.55, s * 0.15);
      ctx.quadraticCurveTo(-s * 0.65, -s * 0.6, 0, -s * 1.1);
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();
      ctx.lineWidth = OUTLINE_LW;
      ctx.strokeStyle = outline;
      ctx.stroke();
      ctx.strokeStyle = outline;
      ctx.lineWidth = RIDGE_LW + 0.5;
      ctx.beginPath();
      ctx.arc(0, -s * 0.2, s * 0.42, 0.2, Math.PI * 1.9);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(0, 0, s * 0.24, 0.4, Math.PI * 1.7);
      ctx.stroke();
      ctx.fillStyle = outline;
      ctx.beginPath();
      ctx.arc(0, s * 0.12, s * 0.08, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // Clam shell - wide domed arc with a flat hinge base and small hinge
      // "ears", plus concentric growth-ring bands (how clams actually grow)
      // instead of a single flat line that read as a mushroom cap's gills.
      ctx.beginPath();
      ctx.arc(0, s * 0.35, s * 0.85, Math.PI * 1.02, Math.PI * 1.98);
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();
      ctx.lineWidth = OUTLINE_LW;
      ctx.strokeStyle = outline;
      ctx.stroke();
      ctx.fillStyle = color;
      ctx.fillRect(-s * 0.95, s * 0.28, s * 0.18, s * 0.14);
      ctx.fillRect(s * 0.77, s * 0.28, s * 0.18, s * 0.14);
      ctx.lineWidth = RIDGE_LW;
      ctx.strokeStyle = dark;
      ctx.beginPath();
      ctx.arc(0, s * 0.35, s * 0.62, Math.PI * 1.08, Math.PI * 1.92);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(0, s * 0.35, s * 0.38, Math.PI * 1.15, Math.PI * 1.85);
      ctx.stroke();
    }

    ctx.restore();
  }

  // --- DRAWING / RENDERING ---
  function draw() {
    ctx.clearRect(0, 0, pixelCanvas.width, pixelCanvas.height);

    ctx.save();
    // Everything below is drawn in the same 800x600 world-space coordinates
    // as before; this scale maps it onto the shared low-res pixel buffer.
    ctx.scale(PIXEL_SCALE, PIXEL_SCALE);
    // Translate rendering context based on cameraY
    ctx.translate(0, -cameraY);

    const viewTop = cameraY - 100;
    const viewBottom = cameraY + 700;

    // 1. Draw sand beach background
    // Dry sand base
    ctx.fillStyle = '#f0e3c5';
    ctx.fillRect(0, viewTop, canvas.width, 800);
    drawTileShading(220, 720, viewTop, viewBottom, 48, '#f0e3c5', '#ead9b8');
    drawSpeckleField(220, 720, viewTop, viewBottom, 40, DRY_SAND_SPECKLES, '#d8c49a');
    drawSpeckleField(220, 720, viewTop, viewBottom, 40, DRY_SAND_SPECKLES_LIGHT, '#fbf1da');

    // Draw Ocean (water) on left, banded with a gentle wave pattern
    drawOceanBands(0, 150, viewTop, viewBottom);
    drawSpeckleField(0, 150, viewTop, viewBottom, 36, OCEAN_SPARKLES, '#bfe6ec');

    // Draw wet sand gradient/transition
    ctx.fillStyle = '#dfcfab';
    ctx.fillRect(150, viewTop, 70, 800);
    drawTileShading(150, 220, viewTop, viewBottom, 16, '#dfcfab', '#d3c09d');
    drawSpeckleField(150, 220, viewTop, viewBottom, 24, WET_SAND_DAPPLES, '#c3ac83');

    // Water shoreline foam - blocky, stepped edge rather than a smooth curve
    drawShoreFoam(150, viewTop, viewBottom);

    // Draw dunes & dry grass on the right side
    ctx.fillStyle = '#dbca9a'; // dune sand
    ctx.fillRect(720, viewTop, 80, 800);
    drawTileShading(720, 800, viewTop, viewBottom, 40, '#dbca9a', '#d1bf8e');
    drawSpeckleField(720, 800, viewTop, viewBottom, 40, DRY_SAND_SPECKLES, '#c3b17f');

    // Draw Dune tufts & plants
    for (let y = Math.floor(viewTop / 120) * 120 - 120; y < viewBottom; y += 120) {
      const row = Math.round(y / 120);
      drawGrassTuft(750, y + 20, row);
      drawGrassTuft(772, y + 80, row + 1);
      if (row % 2 === 0) drawDunePlant(792, y + 50);
    }

    // 2. Draw Interest Points
    for (let ip of interestPoints) {
      drawInterestPoint(ip);
    }

    // 3. Draw Shells
    for (let shell of shells) {
      if (!shell.collected && !shell.missed) {
        drawGroundShadow(shell.x, shell.y + shell.size * 0.6, shell.size * 0.6, shell.size * 0.28);
        drawShellShape(shell);
      }
    }

    // 4. Draw Particles
    for (let p of particles) {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.alpha;
      ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
    }
    ctx.globalAlpha = 1.0;

    // 5. Draw Sailor (young 5yo girl, back-facing, blue outfit, warm brown pigtails)
    drawGroundShadow(sailor.x, sailor.y + 10, 10, 4);
    drawSailor();

    // 6. Draw Bupa (gray cat, small hint of white)
    drawGroundShadow(bupa.x, bupa.y + 6, 9, 3);
    drawBupa();

    ctx.restore();

    // Blit the low-res buffer up to the visible canvas with nearest-neighbor
    // scaling, which is what gives every element on screen the same chunky
    // pixel-art texture instead of smooth vector edges.
    displayCtx.clearRect(0, 0, canvas.width, canvas.height);
    displayCtx.drawImage(pixelCanvas, 0, 0, canvas.width, canvas.height);
  }

  // --- DRAWING HELPER FUNCTIONS ---

  const GRASS_PALETTES = [
    { base: '#7f9a5c', highlight: '#a8c47e', shadow: '#5f7a45' },
    { base: '#8aa564', highlight: '#b3cf88', shadow: '#688048' },
    { base: '#768f52', highlight: '#9fbb76', shadow: '#57703c' }
  ];

  function drawGrassTuft(x, y, variant) {
    const p = GRASS_PALETTES[((variant % GRASS_PALETTES.length) + GRASS_PALETTES.length) % GRASS_PALETTES.length];

    // Grounding shadow so the tuft reads as planted in the sand
    ctx.fillStyle = p.shadow;
    ctx.globalAlpha = 0.5;
    ctx.fillRect(x - 5, y + 10, 12, 3);
    ctx.globalAlpha = 1.0;

    // Layered blades - base color first, varied lengths/angles
    ctx.fillStyle = p.base;
    ctx.fillRect(x - 1, y - 4, 3, 14);
    ctx.fillRect(x - 6, y, 3, 12);
    ctx.fillRect(x + 5, y + 2, 3, 10);
    ctx.fillRect(x - 3, y + 4, 2, 8);
    ctx.fillRect(x + 2, y - 2, 2, 12);

    // Shadow side on the base of the tallest blades for depth
    ctx.fillStyle = p.shadow;
    ctx.fillRect(x - 6, y + 8, 3, 4);
    ctx.fillRect(x + 5, y + 8, 3, 4);

    // Thin highlight blades on top for a layered, detailed silhouette
    ctx.fillStyle = p.highlight;
    ctx.fillRect(x, y - 4, 1, 8);
    ctx.fillRect(x - 5, y, 1, 7);
    ctx.fillRect(x + 6, y + 2, 1, 6);
    ctx.fillRect(x - 2, y - 6, 2, 2);
  }

  // Larger dune plant used sparingly among the grass tufts for variety.
  function drawDunePlant(x, y) {
    ctx.fillStyle = '#5f7a45';
    ctx.globalAlpha = 0.5;
    ctx.fillRect(x - 6, y + 12, 14, 3);
    ctx.globalAlpha = 1.0;

    // Stem
    ctx.fillStyle = '#7a5a3a';
    ctx.fillRect(x - 1, y - 2, 2, 14);

    // Leaf clusters
    ctx.fillStyle = '#7f9a5c';
    ctx.fillRect(x - 8, y - 10, 7, 6);
    ctx.fillRect(x + 2, y - 14, 7, 6);
    ctx.fillRect(x - 4, y - 18, 7, 6);

    ctx.fillStyle = '#a8c47e';
    ctx.fillRect(x - 7, y - 10, 3, 2);
    ctx.fillRect(x + 3, y - 14, 3, 2);
    ctx.fillRect(x - 3, y - 18, 3, 2);

    ctx.fillStyle = '#5f7a45';
    ctx.fillRect(x - 8, y - 5, 7, 2);
    ctx.fillRect(x + 2, y - 9, 7, 2);
    ctx.fillRect(x - 4, y - 13, 7, 2);
  }

  function drawInterestPoint(ip) {
    // Draw visual graphic representing the interest point
    if (ip.type !== 'tidepool') {
      drawGroundShadow(ip.x, ip.y + 10, 16, 5);
    }

    ctx.save();
    ctx.translate(ip.x, ip.y);

    if (ip.type === 'rock') {
      // Main rock shape - warm stone tone, deliberately distinct from
      // Bupa's cool gray (#808285) so he stays readable stopped beside it.
      ctx.fillStyle = '#6e6a5f';
      ctx.fillRect(-12, -8, 24, 16);
      ctx.fillStyle = '#8f8a78'; // highlights
      ctx.fillRect(-10, -8, 8, 4);
      ctx.fillRect(2, -4, 6, 4);
      ctx.fillStyle = '#46433a'; // shadow
      ctx.fillRect(-12, 4, 24, 4);
      ctx.fillRect(8, 0, 4, 4);
      // Small shell-cluster accents at the base of the rock pile
      drawShellShape({ x: -14, y: 9, size: 5, color: '#e8a9a0', shapeType: 2 });
      drawShellShape({ x: 12, y: 8, size: 4, color: '#8fb9c9', shapeType: 0 });
    }
    else if (ip.type === 'driftwood') {
      // Driftwood log
      ctx.fillStyle = '#8a5c38';
      ctx.fillRect(-18, -4, 36, 8);
      ctx.fillStyle = '#aa7c58'; // highlight
      ctx.fillRect(-14, -4, 28, 3);
      // Wood grain lines
      ctx.strokeStyle = '#6e4424';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-16, -1); ctx.lineTo(16, -1);
      ctx.moveTo(-16, 2); ctx.lineTo(16, 2);
      ctx.stroke();
      // Small branch details
      ctx.fillStyle = '#6e4424';
      ctx.fillRect(-10, -8, 4, 4);
      ctx.fillRect(10, 4, 4, 4);
      // Small grass tuft growing beside the driftwood
      drawGrassTuft(20, -2, Math.round(ip.x));
    }
    else if (ip.type === 'tidepool') {
      // Water circle
      ctx.fillStyle = '#4da2bf';
      ctx.beginPath();
      ctx.arc(0, 0, 18, 0, Math.PI * 2);
      ctx.fill();
      // Outer wet sand ring
      ctx.strokeStyle = '#c9b78f';
      ctx.lineWidth = 3;
      ctx.stroke();
      // Ripple ring for added texture
      ctx.strokeStyle = '#6cbcd8';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, 11, 0, Math.PI * 2);
      ctx.stroke();
      // Highlights inside water
      ctx.fillStyle = '#7ecce6';
      ctx.fillRect(-6, -6, 5, 2);
      ctx.fillRect(2, 4, 6, 2);
    }

    // Draw indicator text above unvisited ones
    if (!ip.visited) {
      ctx.font = '10px Courier New';
      ctx.fillStyle = '#df8931';
      ctx.textAlign = 'center';
      ctx.fillText('•', 0, -18);
    }

    ctx.restore();
  }

  function drawSailor() {
    ctx.save();
    ctx.translate(sailor.x, sailor.y);

    // Direction flip
    if (sailor.facingLeft) {
      ctx.scale(-1, 1);
    }

    const hair = '#8b512c';       // warm medium brown
    const hairShadow = '#6e3d20';
    const hairHighlight = '#a56b3f';
    const skin = '#ffd1b3';
    const outfit = '#3a7cb5';
    const outfitShadow = '#2d5f8f';
    const outfitHighlight = '#5c9ad1';

    const walkOffset = sailor.isMoving ? Math.sin(Date.now() * 0.015) * 4 : 0;
    const pigtailSway = sailor.isMoving ? Math.sin(Date.now() * 0.012) * 2 : 0;

    // 1. Back of head: she faces up the beach, away from the viewer, so the
    // entire head is hair - no face/eyes are drawn on this side.
    ctx.fillStyle = hair;
    ctx.fillRect(-11, -34, 22, 16);
    ctx.fillStyle = hairHighlight;
    ctx.fillRect(-8, -33, 10, 3);
    ctx.fillStyle = hairShadow;
    ctx.fillRect(-11, -20, 22, 2);

    // Small sliver of nape skin visible beneath the hair, above the collar
    ctx.fillStyle = skin;
    ctx.fillRect(-3, -18, 6, 6);

    // 2. Pigtails - large and prominent, worn low off the sides of the head,
    // with hair ties, so they stay readable while walking. The head block
    // spans x -11..11; pigtails are held at least 4 world px clear of that
    // edge (was 0-3px) so the gap survives the half-res downscale instead
    // of anti-aliasing away into one fused head+hair mass.
    ctx.fillStyle = hair;
    ctx.fillRect(-23 + pigtailSway, -30, 8, 8);
    ctx.fillRect(-26 + pigtailSway, -24, 9, 11);
    ctx.fillRect(-24 + pigtailSway, -14, 6, 8);
    ctx.fillRect(15 - pigtailSway, -30, 8, 8);
    ctx.fillRect(17 - pigtailSway, -24, 9, 11);
    ctx.fillRect(18 - pigtailSway, -14, 6, 8);

    ctx.fillStyle = hairHighlight;
    ctx.fillRect(-22 + pigtailSway, -28, 3, 3);
    ctx.fillRect(18 - pigtailSway, -28, 3, 3);

    // Hair ties - brighter and taller than before so they don't disappear
    // after downscale.
    ctx.fillStyle = '#ffd54a';
    ctx.fillRect(-25 + pigtailSway, -23, 7, 5);
    ctx.fillRect(18 - pigtailSway, -23, 7, 5);

    // 3. Outfit (blue dress, back view) with a small collar trim at the nape
    ctx.fillStyle = '#eef3f6';
    ctx.fillRect(-6, -13, 12, 2);
    ctx.fillStyle = outfit;
    ctx.fillRect(-10, -11, 20, 15);
    ctx.fillStyle = outfitHighlight;
    ctx.fillRect(-8, -11, 16, 4);
    ctx.fillStyle = outfitShadow;
    ctx.fillRect(-10, 0, 20, 4);

    // 4. Arms (blue sleeves + skin hands)
    ctx.fillStyle = outfit;
    ctx.fillRect(-13, -10, 3, 8);
    ctx.fillRect(10, -10, 3, 8);
    ctx.fillStyle = skin;
    ctx.fillRect(-13, -2, 3, 3);
    ctx.fillRect(10, -2, 3, 3);

    // 5. Legs / Shoes (white socks + black shoes)
    ctx.fillStyle = '#ffffff'; // socks
    ctx.fillRect(-6, 4 + walkOffset / 2, 4, 4);
    ctx.fillRect(2, 4 - walkOffset / 2, 4, 4);

    ctx.fillStyle = '#222222'; // shoes
    ctx.fillRect(-7, 8 + walkOffset / 2, 5, 3);
    ctx.fillRect(1, 8 - walkOffset / 2, 5, 3);

    ctx.restore();
  }

  function drawBupa() {
    ctx.save();
    ctx.translate(bupa.x, bupa.y);

    if (bupa.facingLeft) {
      ctx.scale(-1, 1);
    }

    // Color definitions
    const gray = '#808285';
    const darkGray = '#58595b';
    const white = '#f1f2f2';

    // Bupa's state checks
    if (bupa.state === 'CHECK_BACK') {
      // --- Sitting, looking back (towards screen/Sailor) ---
      // Body (sitting upright)
      ctx.fillStyle = gray;
      ctx.fillRect(-8, -10, 16, 12);
      ctx.fillRect(-6, -14, 12, 4);
      
      // Cat feet (with white paws)
      ctx.fillStyle = darkGray;
      ctx.fillRect(-6, 2, 4, 4);
      ctx.fillRect(2, 2, 4, 4);
      ctx.fillStyle = white;
      ctx.fillRect(-6, 5, 4, 2);
      ctx.fillRect(2, 5, 4, 2);

      // Tail curled around
      ctx.fillStyle = darkGray;
      ctx.fillRect(-12, 2, 5, 3);

      // Head (facing back, so eyes looking down/sideways)
      ctx.fillStyle = gray;
      ctx.fillRect(-7, -22, 14, 9);
      // Ears
      ctx.fillStyle = darkGray;
      ctx.fillRect(-7, -26, 3, 4);
      ctx.fillRect(4, -26, 3, 4);
      // Eyes looking back (white + green)
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(-4, -18, 2, 3);
      ctx.fillRect(2, -18, 2, 3);
      ctx.fillStyle = '#7ac143'; // green pupil
      ctx.fillRect(-3, -18, 1, 2);
      ctx.fillRect(3, -18, 1, 2);

      // White chest
      ctx.fillStyle = white;
      ctx.fillRect(-2, -10, 4, 6);

      // meow / worry exclamation bubble
      if (bupa.meowTimer > 0) {
        ctx.scale(bupa.facingLeft ? -1 : 1, 1); // unflip text
        ctx.fillStyle = 'rgba(26, 28, 30, 0.9)';
        ctx.fillRect(-25, -45, 50, 16);
        ctx.strokeStyle = '#e3a857';
        ctx.lineWidth = 1;
        ctx.strokeRect(-25, -45, 50, 16);
        
        ctx.fillStyle = '#e3a857';
        ctx.font = 'bold 9px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('meow?', 0, -34);
      }
    } 
    else if (bupa.state === 'INVESTIGATING') {
      // Decouple investigating stages to make progress readable
      // First 40%: standing sniff
      // Next 40%: sitting stare
      // Last 20%: about to leave (standing alert / tail twitch)
      
      if (bupa.stateProgress < 0.4) {
        // --- STAGE 1: Standing sniff (Low head, sniffing interest point) ---
        // Tail
        ctx.fillStyle = darkGray;
        ctx.fillRect(-14, -12, 6, 3);
        // Body
        ctx.fillStyle = gray;
        ctx.fillRect(-8, -10, 15, 9);
        // Legs
        ctx.fillStyle = darkGray;
        ctx.fillRect(-6, -1, 3, 4);
        ctx.fillRect(2, -1, 3, 4);
        ctx.fillStyle = white; // white front paws
        ctx.fillRect(2, 2, 3, 2);
        
        // Head low
        ctx.fillStyle = gray;
        ctx.fillRect(6, -11, 9, 8);
        ctx.fillStyle = darkGray; // ears
        ctx.fillRect(7, -14, 2, 3);
        ctx.fillRect(11, -14, 2, 3);
        ctx.fillStyle = '#7ac143'; // sniffing eye
        ctx.fillRect(10, -9, 2, 2);
      } 
      else if (bupa.stateProgress < 0.8) {
        // --- STAGE 2: Sitting stare (sitting down staring) ---
        // Body (sitting)
        ctx.fillStyle = gray;
        ctx.fillRect(-8, -8, 14, 10);
        ctx.fillRect(-5, -12, 10, 5);
        // Legs
        ctx.fillStyle = darkGray;
        ctx.fillRect(-5, 2, 3, 3);
        ctx.fillRect(1, 2, 3, 3);
        ctx.fillStyle = white;
        ctx.fillRect(1, 4, 3, 2);
        
        // Tail
        ctx.fillStyle = darkGray;
        ctx.fillRect(-12, 0, 5, 3);

        // Head looking forward-down
        ctx.fillStyle = gray;
        ctx.fillRect(2, -18, 9, 8);
        ctx.fillStyle = darkGray; // ears
        ctx.fillRect(3, -21, 2, 3);
        ctx.fillRect(7, -21, 2, 3);
        ctx.fillStyle = '#7ac143'; // eye
        ctx.fillRect(6, -15, 2, 2);
      } 
      else {
        // --- STAGE 3: About to leave (standing alert, tail wagging) ---
        // Tail wag animation
        let tailOffset = Math.floor(Date.now() / 150) % 2 * 3;
        ctx.fillStyle = darkGray;
        ctx.fillRect(-14, -12 - tailOffset, 6, 3);
        
        // Body
        ctx.fillStyle = gray;
        ctx.fillRect(-8, -12, 15, 9);
        // Legs
        ctx.fillStyle = darkGray;
        ctx.fillRect(-6, -3, 3, 6);
        ctx.fillRect(3, -3, 3, 6);
        ctx.fillStyle = white;
        ctx.fillRect(3, 2, 3, 2);

        // Head high & alert
        ctx.fillStyle = gray;
        ctx.fillRect(4, -19, 9, 8);
        ctx.fillStyle = darkGray; // ears
        ctx.fillRect(5, -22, 2, 3);
        ctx.fillRect(9, -22, 2, 3);
        ctx.fillStyle = '#7ac143'; // eye
        ctx.fillRect(8, -16, 2, 2);
      }
    } 
    else {
      // --- TROTTING ---
      let walkCycle = Math.sin(Date.now() * 0.02) * 3;
      
      // Tail
      ctx.fillStyle = darkGray;
      ctx.fillRect(-14, -12, 6, 3);
      
      // Body
      ctx.fillStyle = gray;
      ctx.fillRect(-8, -12, 15, 9);

      // Legs trotting animation
      ctx.fillStyle = darkGray;
      ctx.fillRect(-6, -3 + walkCycle, 3, 6);
      ctx.fillRect(3, -3 - walkCycle, 3, 6);
      ctx.fillStyle = white; // white front paw
      ctx.fillRect(3, 2 - walkCycle, 3, 2);

      // Head
      ctx.fillStyle = gray;
      ctx.fillRect(4, -18, 9, 8);
      ctx.fillStyle = darkGray; // ears
      ctx.fillRect(5, -21, 2, 3);
      ctx.fillRect(9, -21, 2, 3);
      ctx.fillStyle = '#7ac143'; // eye
      ctx.fillRect(8, -15, 2, 2);
    }

    ctx.restore();
  }

  // Start initialization
  resetGame();
  requestAnimationFrame(gameTick);
</script>
