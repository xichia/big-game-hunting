<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Trail of Embers — Probe Prototype</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #0a0a08;
    color: #ddd;
    font-family: Menlo, Consolas, monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #hud {
    width: 900px;
    max-width: 100%;
    padding: 8px 4px;
    font-size: 13px;
    color: #a89;
    display: flex;
    justify-content: space-between;
  }
  #hud span.key { color: #e8b04a; }
  canvas {
    background: #06120a;
    border: 1px solid #333;
    image-rendering: pixelated;
    /* Scale the display down to fit the viewport on smaller screens/windows
       while keeping the intrinsic field-pixel resolution (and therefore all
       collision/coordinate math) untouched -- a plain aspect-ratio-preserving
       CSS shrink, not a camera or responsive-layout system. */
    max-width: 96vw;
    max-height: 88vh;
  }
  #overlay-msg {
    position: absolute;
    top: 45%;
    width: 900px;
    max-width: 100%;
    text-align: center;
    font-size: 28px;
    font-weight: bold;
    pointer-events: none;
    text-shadow: 0 0 8px #000, 0 0 8px #000;
  }
</style>
</head>
<body>
  <div id="hud">
    <span><span class="key">Arrows/WASD</span> move &nbsp; <span class="key">Space</span> ember &nbsp; <span class="key">R</span> retry &nbsp; <span class="key">N</span> next &nbsp; <span class="key">M</span> mute &nbsp; <span class="key">G</span> debug</span>
    <span id="level-status"></span>
    <span id="cache-status"></span>
    <span id="audio-status">sound: on</span>
    <span id="ember-status">ember: ready</span>
  </div>
  <div style="position: relative;">
    <canvas id="game" width="900" height="560"></canvas>
    <div id="overlay-msg"></div>
  </div>

<script>
"use strict";

// ---- constants -------------------------------------------------------
const W = 900, H = 560;
const PLAYER_RADIUS = 10;
const PLAYER_SPEED = 175;           // px/sec
const TORCH_RADIUS = 85;            // player's constant visibility + beast's default target

const BEAST_RADIUS = 13;
const BEAST_PATROL_SPEED = 55;
const BEAST_IDLE_SECONDS = 1.2;     // brief grace period at level start

const EMBER_RADIUS = 155;           // peak illumination radius
const EMBER_FADE_MS = 1500;         // trailing fade of the light itself (after it stops being a target)

const CACHE_RADIUS = 11;            // Cinder Cache pickup radius

// Per-level tunables fall back to these baseline values (the exact values
// the first playtest ran with). fieldW/fieldH let a level use a larger
// playfield; levels without them run at the original 900x560.
const LEVEL_DEFAULTS = {
  beastSpeed: 130,        // px/sec, slower than player
  emberCooldownMs: 900,
  emberLifetimeMs: 5200,  // how long an ember stays "hot" (a valid beast target)
  fieldW: W,
  fieldH: H,
};

// added a fourth, larger maze level; the Fullscreen/Larger Maze Pass added a
// fifth, larger still; this bounded maze pass adds a sixth, bigger and
// tighter yet. Only simple data varies per level --
// starts, safe zone, obstacle rectangles, playfield size, and beast speed /
// ember tuning. Obstacles block the player but never the beast, which
// still walks straight through walls by design.

    // cuts through the wall), so you must bait it away before the approach.
    // Tuning is identical to level 1 -- the difficulty is purely spatial.

    beastStart: { x: 690, y: 280 },
    safeZone: { x: 815, y: 280, r: 28 },
    obstacles: [
      // mid-field wall with a single center gap
      { x: 300, y: 0,   w: 26, h: 220 },
      { x: 300, y: 340, w: 26, h: 220 },

      { x: 450, y: 150, w: 180, h: 24 },

      { x: 730, y: 130, w: 26, h: 300 },
    ],
  },
  {
    name: "The Long Dark",
    // A serpentine of four walls with alternating gaps: the player's route

    // Faster beast, slower and shorter-lived embers -- winning takes route
    // memory, timed bait drops, and committing to each leg of the snake.
    playerStart: { x: 60, y: 500 },
    beastStart: { x: 440, y: 300 },
    safeZone: { x: 840, y: 64, r: 26 },
    beastSpeed: 150,
    emberCooldownMs: 1500,
    emberLifetimeMs: 4000,
    obstacles: [
      { x: 150, y: 150, w: 26, h: 410 },  // pass at the top
      { x: 320, y: 0,   w: 26, h: 410 },  // pass at the bottom
      { x: 490, y: 150, w: 26, h: 410 },  // pass at the top
      { x: 660, y: 0,   w: 26, h: 410 },  // pass at the bottom
      { x: 760, y: 170, w: 140, h: 24 },  // final weave before the circle
    ],
  },
  {
    name: "The Ember Maze",
    // Scale Pass 1: one larger (1280x760) hand-authored maze. Three wall

    beastStart: { x: 615, y: 300 },
    safeZone: { x: 1200, y: 80, r: 28 },

    emberCooldownMs: 1500,
    emberLifetimeMs: 4000,
    obstacles: [

      { x: 0,    y: 170, w: 810, h: 24 },
      { x: 940,  y: 170, w: 340, h: 24 },
      // mid band (y=360) -- gaps at columns one, two, three; open over the shaft
      { x: 0,    y: 360, w: 300, h: 24 },
      { x: 430,  y: 360, w: 140, h: 24 },
      { x: 680,  y: 360, w: 130, h: 24 },
      { x: 940,  y: 360, w: 150, h: 24 },
      // low band (y=576) -- gaps at the start, the central spine, and the shaft mouth
      { x: 190,  y: 576, w: 380, h: 24 },

      { x: 1080, y: 0,   w: 26,  h: 100 },

  {
    name: "The Deep Maze",

    fieldW: 1600,
    fieldH: 900,
    playerStart: { x: 70, y: 830 },
    beastStart: { x: 820, y: 560 },
    safeZone: { x: 1530, y: 80, r: 28 },

      { x: 1500, y: 476, w: 26,  h: 200 },

      { x: 800,  y: 452, w: 150, h: 24 },
      { x: 1150, y: 452, w: 450, h: 24 },
      // landmark hall: one large block, a recognizable waypoint you can
      // loop around either side; the bail-out gap above drops in right
      // beside it
      { x: 700,  y: 280, w: 200, h: 150 },
      // bait nook -- a shallow pocket open only at the top, right beside

      { x: 1150, y: 350, w: 26,  h: 100 },
      { x: 1300, y: 350, w: 26,  h: 100 },
      { x: 1150, y: 426, w: 176, h: 24 },
      // top band (y=228) -- single gap at x1350-1500 into the final approach
      { x: 0,    y: 228, w: 1350, h: 24 },
      { x: 1500, y: 228, w: 100,  h: 24 },
      // final weave before the stone circle -- forces a lateral jog left
      // before the last climb up to the circle
      { x: 1480, y: 100, w: 26,  h: 128 },
    ],
  },
  {
    name: "The Coiled Maze",
    // Bounded "bigger, tighter maze" pass: one larger still (1800x1000)
    // hand-authored maze, more maze-like than level 5 -- not broader, no
    // new systems. Six horizontal bands (one more than level 5's four)
    // split the field into six strips; the route coils in a full S-shape,
    // climbing the right side, then the left, then the right, then the
    // left, then the right again to the circle -- a longer, tighter weave
    // than any previous level. Tuning: beast speed 150 (matches level 3,

    // numbers reuse levels 4-5's (same emergent three-hot-ember limit).

    //   - Orientation wall -- a small low block in the start strip, clear

    //     level 5's start chamber.
    //   - Fair dead end -- a second gap beside the real climb out of the
    //     start strip looks identical but opens onto a small pocket sealed
    //     on every side except that gap: one failed attempt teaches it,
    //     same motif as levels 4-5, moved so it never blocks the main route.

    //     width of any other gap on this map) chokepoint partway through

    //     room around a single landmark block right before the exit gap:
    //     room to circle the beast, drop an ember, and slip past.
    //   - Bail-out loop -- a narrow secondary gap partway along the third
    //     coil drops a chased player straight into the next strip, skipping
    //     the back half of that coil without skipping the whole level.
    //   - Landmark -- one recognizable block in the third strip, a waypoint
    //     to loop around, beside the bail-out gap.
    //   - Final jog -- one last lateral step before the circle, rewarding
    //     players who remember the layout over ones who beeline.
    fieldW: 1800,
    fieldH: 1000,
    playerStart: { x: 70, y: 930 },
    beastStart: { x: 960, y: 560 },
    safeZone: { x: 1730, y: 70, r: 28 },
    beastSpeed: 150,
    emberCooldownMs: 1500,
    emberLifetimeMs: 4000,
    obstacles: [
      // start strip (y844-1000): small low block, clear of the start
      // (70,930) and of both band-A gaps below -- early wall-sliding teach
      { x: 500,  y: 920, w: 160, h: 24 },

      // band A (y820) -- real climb at x1450-1650; decoy gap runs from

      { x: 1690, y: 684, w: 26, h: 136 },
      { x: 1200, y: 684, w: 26, h: 90  }, // pass low below (gap y774-820)
      { x: 900,  y: 730, w: 26, h: 90  }, // pass high above (gap y684-730)
      { x: 600,  y: 684, w: 26, h: 96  }, // squeeze top half
      { x: 600,  y: 810, w: 26, h: 10  }, // squeeze bottom half (gap y780-810, 30px)

      // band B (y660) -- single gap at the west, x150-350
      { x: 0,    y: 660, w: 150,  h: 24 },
      { x: 350,  y: 660, w: 1450, h: 24 },

      // coil 2, strip S2 (y524-660, beast's home strip): one chokepoint
      // hanging from the ceiling near the entrance, then a wide open bait
      // chamber around a landmark block right before the east exit gap --
      // room to juke the beast and drop an ember before the final dart
      { x: 700,  y: 524, w: 26,  h: 80 }, // pass under (gap y604-660)
      { x: 1150, y: 562, w: 120, h: 60 }, // landmark inside the chamber

      // band C (y500) -- single gap at the east, x1450-1650
      { x: 0,    y: 500, w: 1450, h: 24 },
      { x: 1650, y: 500, w: 150,  h: 24 },

      // coil 3, strip S3 (y364-500): one landmark block with generous
      // clearance above and below (loop around either side)
      { x: 650,  y: 402, w: 220, h: 60 },

      // band D (y340) -- main gap at the west (x150-350, the full route);

      // into strip S4 without crossing the rest of this coil
      { x: 0,    y: 340, w: 150, h: 24 },
      { x: 350,  y: 340, w: 530, h: 24 },
      { x: 930,  y: 340, w: 870, h: 24 },

      // coil 4, strip S4 (y204-340): a weave -- pass high, then pass low --

      { x: 600,  y: 250, w: 26, h: 90 }, // pass high above (gap y204-250)
      { x: 1000, y: 204, w: 26, h: 90 }, // pass low below (gap y294-340)

      // band E (y180) -- single gap at the east, x1450-1650, into the
      // final approach strip
      { x: 0,    y: 180, w: 1450, h: 24 },
      { x: 1650, y: 180, w: 150,  h: 24 },

      // approach strip S5 (y0-180): one final lateral jog before the circle
      { x: 1680, y: 100, w: 26, h: 80 },
    ],
  },
  {
    name: "The Ember Ring",
    // Cinder Cache pass, twice revised after Ian's playtests.
    //
    // Revision 1 replaced the first draft's map ("The Cinder Hoard," levels
    // 4-6's banded-coil language with a nook stapled on) because the cache
    // route was never a real decision -- straightforward to fetch, not
    // necessary, felt like a chore. Ian's call: same approximate size is
    // fine, but it needs to be a genuinely new map, and the cache needs to
    // be specifically useful for THIS level, not decorative.
    //
    // Revision 2 (this one) keeps that map but changes what the cache DOES.
    // Revision 1's cache spent itself immediately on pickup (an instant
    // cooldown refresh), which Ian still called "not really necessary" even
    // on the new map -- an immediate effect is only ever useful if you touch
    // it at exactly the right moment. His fix: don't spend it immediately.
    // Collecting it now grants a held Cinder Charge, usable once, whenever
    // the player actually needs it later -- so the level only has to teach
    // that the resource exists, not force a single "correct" pickup moment.
    //
    // This is a different spatial problem, not a bigger/tighter version of
    // the same one: a single open ARENA (not six stacked bands) with one
    // central island splitting it into two lanes, ringed by just two
    // boundary walls (arena-to-start, arena-to-corridor), each with exactly
    // one gap. Same 1800x1000 field as level 6 -- the new axis is still the
    // collectible and the lane choice it creates, not a bigger map.
    //
    //   - West lane (x0-750): the DIRECT route. The beast starts right in
    //     it (700,550), so this lane means facing the beast almost
    //     immediately, with no time to prepare a bait. One micro-chokepoint
    //     (a single 26px-wide wall) is its only texture -- fast, short,
    //     and risky because you meet the beast cold.
    //   - East lane (x1050-1800): the LONG WAY ROUND. The beast starts far
    //     from it, so it buys real distance/time before the beast can close
    //     in -- safer at first. But both lanes funnel back through the same
    //     one exit gap (west side, x260-460 @ y300), so an east-lane player
    //     still has to cross back over the open strip above the island
    //     (y324-450, full width) to reach it -- the level's one unavoidable
    //     exposed crossing, which sits directly between the beast's den and
    //     the exit no matter which lane you took.
    //
    // The Cinder Cache sits in a sealed alcove (roofed + walled on three

    // charge. But the level's one unavoidable exposed crossing (the open

    // normal drop and a spent charge feel consequential; ember lifetime

    fieldW: 1800,
    fieldH: 1000,
    playerStart: { x: 900, y: 930 },
    beastStart: { x: 700, y: 550 },
    safeZone: { x: 70, y: 70, r: 28 },
    beastSpeed: 150,
    emberCooldownMs: 3500,
    emberLifetimeMs: 4000,
    cinderCaches: [{ x: 1663, y: 560 }],

      { x: 0,    y: 800, w: 800,  h: 24 },
      { x: 1000, y: 800, w: 800,  h: 24 },

      // west lane micro-chokepoint -- close to the beast's den, the direct

      { x: 300, y: 500, w: 26, h: 140 },

      // central island -- the arena's one big shape. Splits the open room

      { x: 750, y: 450, w: 300, h: 300 },

      // Cinder Cache alcove -- roofed and walled on three sides, open only

      { x: 1600, y: 480, w: 150, h: 24 },  // alcove roof
      { x: 1600, y: 504, w: 26,  h: 120 }, // alcove west wall
      { x: 1724, y: 504, w: 26,  h: 120 }, // alcove east wall

      // arena/corridor boundary -- single gap at the west, x260-460. Both
      // lanes funnel back to this one exit, directly across the open strip
      // above the island from the beast's den
      { x: 0,   y: 300, w: 260,  h: 24 },
      { x: 460, y: 300, w: 1340, h: 24 },

      // final approach (y0-300, x0-600): a tight S-weave before the circle

      { x: 400, y: 130, w: 26, h: 170 },
    ],
  },
];

// ---- state -------------------------------------------------------
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const fogCanvas = document.createElement("canvas");
fogCanvas.width = W; fogCanvas.height = H;
const fogCtx = fogCanvas.getContext("2d");

const emberStatusEl = document.getElementById("ember-status");
const cacheStatusEl = document.getElementById("cache-status");
const levelStatusEl = document.getElementById("level-status");
const overlayMsgEl = document.getElementById("overlay-msg");
const hudEl = document.getElementById("hud");

let debugView = false;
let gameOver = false; // "won" | "lost" | false
let lastEmberDropAt = -Infinity;
let lastCachePickupAt = -Infinity;  // drives the "cinder charge ready" HUD message
let lastChargeSpentAt = -Infinity;  // drives the "cinder charge spent" HUD message
let hasCinderCharge = false;        // at most one stored charge, held until spent or the level resets
let spaceWasDown = false;
let gpButton0WasDown = false;
let gpButton9WasDown = false;
let emberDroppedThisFrame = false;
const CACHE_PICKUP_MSG_MS = 900;
const CACHE_SPENT_MSG_MS = 900;
const CACHE_BURST_MS = 500;
let elapsedMs = 0;

let levelIndex = 0;
let level; // current level config, resolved against LEVEL_DEFAULTS
let player, beast, embers, caches, cacheBursts;

function loadLevel(i) {
  levelIndex = i;
  level = Object.assign({}, LEVEL_DEFAULTS, LEVELS[i]);
  canvas.width = level.fieldW;
  canvas.height = level.fieldH;
  fogCanvas.width = level.fieldW;
  fogCanvas.height = level.fieldH;
  hudEl.style.width = level.fieldW + "px";
  overlayMsgEl.style.width = level.fieldW + "px";
  levelStatusEl.textContent = `level ${i + 1}/${LEVELS.length} — ${level.name}`;
  resetGame();
}

function resetGame() {
  player = { x: level.playerStart.x, y: level.playerStart.y, facing: 1 }; // facing is cosmetic only
  beast = {
    x: level.beastStart.x, y: level.beastStart.y,
    state: "idle",             // idle | patrol | chase-ember | chase-torch
    patrolTarget: { x: level.beastStart.x, y: level.beastStart.y + 160 },
  };
  embers = []; // { x, y, droppedAt }
  // Cinder Caches only exist where a level's data lists them; most levels
  // have none. Cloned fresh from level data so a restart always restores
  // any caches collected during the previous attempt.
  caches = (level.cinderCaches || []).map(c => ({ x: c.x, y: c.y }));
  cacheBursts = []; // { x, y, at } -- brief pickup-feedback rings, cleared on every reset
  lastEmberDropAt = -Infinity;
  lastCachePickupAt = -Infinity;
  lastChargeSpentAt = -Infinity;
  hasCinderCharge = false; // no carryover between levels or across a restart, per design brief
  elapsedMs = 0;
  gameOver = false;
  overlayMsgEl.textContent = "";
}
loadLevel(0);

// ---- input -------------------------------------------------------
const keys = new Set();
window.addEventListener("keydown", (e) => {
  if (typeof initAudio === "function") initAudio();
  keys.add(e.key.toLowerCase());
  if (e.key === " ") e.preventDefault(); // stop page scroll
  if (e.key.toLowerCase() === "r") {
    if (e.shiftKey) loadLevel(0); // full reset back to level 1
    else resetGame();             // restart the current level
  }
  if (e.key.toLowerCase() === "n" && gameOver === "won" && levelIndex < LEVELS.length - 1) {
    loadLevel(levelIndex + 1);
  }
  if (e.key.toLowerCase() === "g") debugView = !debugView;
  if (e.key.toLowerCase() === "m") {
    if (typeof toggleMute === "function") toggleMute();
  }

  if (/^[1-9]$/.test(e.key)) {
    const num = parseInt(e.key, 10);
    if (num <= LEVELS.length) {
      loadLevel(num - 1);
    }
  }
});
window.addEventListener("keyup", (e) => keys.delete(e.key.toLowerCase()));

// ---- helpers -------------------------------------------------------
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

function circleRectCollide(cx, cy, r, rect) {
  const nearestX = Math.max(rect.x, Math.min(cx, rect.x + rect.w));
  const nearestY = Math.max(rect.y, Math.min(cy, rect.y + rect.h));
  return Math.hypot(cx - nearestX, cy - nearestY) < r;
}

function moveToward(entity, target, speed, dtSec) {
  const dx = target.x - entity.x, dy = target.y - entity.y;
  const d = Math.hypot(dx, dy);
  if (d < 1) return;
  const step = Math.min(speed * dtSec, d);
  entity.x += (dx / d) * step;
  entity.y += (dy / d) * step;
}

// ---- audio -------------------------------------------------------
let audioCtx = null;
let masterGain = null;
let isMuted = false;

let proximityOsc = null;
let proximityLfo = null;
let proximityLfoGain = null;
let proximityGain = null;

function initAudio() {
  if (audioCtx) {
    if (audioCtx.state === "suspended") {
      audioCtx.resume();
    }
    return;
  }
  try {
    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
    if (!AudioContextClass) return;
    audioCtx = new AudioContextClass();

    masterGain = audioCtx.createGain();
    masterGain.gain.setValueAtTime(isMuted ? 0 : 1, audioCtx.currentTime);
    masterGain.connect(audioCtx.destination);

    proximityOsc = audioCtx.createOscillator();
    proximityOsc.type = "sine";
    proximityOsc.frequency.setValueAtTime(110, audioCtx.currentTime);

    proximityLfo = audioCtx.createOscillator();
    proximityLfo.type = "sine";
    proximityLfo.frequency.setValueAtTime(1, audioCtx.currentTime);

    proximityLfoGain = audioCtx.createGain();
    proximityLfoGain.gain.setValueAtTime(0, audioCtx.currentTime);

    proximityGain = audioCtx.createGain();
    proximityGain.gain.setValueAtTime(0, audioCtx.currentTime);

    proximityLfo.connect(proximityLfoGain);
    proximityLfoGain.connect(proximityGain.gain);

    proximityOsc.connect(proximityGain);
    proximityGain.connect(masterGain);

    proximityOsc.start();
    proximityLfo.start();
  } catch (e) {
    audioCtx = null;
  }
}

function toggleMute() {
  isMuted = !isMuted;
  const audioStatusEl = document.getElementById("audio-status");
  if (audioStatusEl) {
    audioStatusEl.textContent = isMuted ? "sound: muted" : "sound: on";
  }
  if (masterGain && audioCtx) {
    masterGain.gain.setValueAtTime(isMuted ? 0 : 1, audioCtx.currentTime);
  }
}

function updateProximityAudio(distToBeast) {
  if (!audioCtx || isMuted || gameOver) {
    if (proximityGain && audioCtx) {
      proximityGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
    }
    return;
  }

  const maxDistance = 350;
  if (distToBeast > maxDistance) {
    if (proximityGain && audioCtx) {
      proximityGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
    }
    return;
  }

  const norm = 1 - (distToBeast / maxDistance); // 0 to 1
  const targetGain = norm * 0.25;
  proximityGain.gain.setTargetAtTime(targetGain, audioCtx.currentTime, 0.15);
  proximityLfoGain.gain.setTargetAtTime(targetGain * 0.4, audioCtx.currentTime, 0.15);

  const targetLfoFreq = 1 + norm * 7;
  proximityLfo.frequency.setTargetAtTime(targetLfoFreq, audioCtx.currentTime, 0.15);
}

function playEmberTick() {
  if (!audioCtx || isMuted || gameOver) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "sine";
    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.05);

    gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);

    osc.connect(gain);
    gain.connect(masterGain);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.06);
  } catch (e) {}
}

function playWinStinger() {
  if (!audioCtx || isMuted) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "triangle";
    osc.frequency.setValueAtTime(220, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.4);

    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);

    osc.connect(gain);
    gain.connect(masterGain);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.45);
  } catch (e) {}
}

function playLossStinger() {
  if (!audioCtx || isMuted) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "sawtooth";
    osc.frequency.setValueAtTime(150, audioCtx.currentTime);
    osc.frequency.linearRampToValueAtTime(30, audioCtx.currentTime + 0.5);

    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);

    osc.connect(gain);
    gain.connect(masterGain);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.55);
  } catch (e) {}
}

// ---- update -------------------------------------------------------
function updatePlayer(dtSec, gp) {
  let dx = 0, dy = 0;
  if (keys.has("arrowleft") || keys.has("a")) dx -= 1;
  if (keys.has("arrowright") || keys.has("d")) dx += 1;
  if (keys.has("arrowup") || keys.has("w")) dy -= 1;
  if (keys.has("arrowdown") || keys.has("s")) dy += 1;

  if (gp) {
    if (gp.axes && gp.axes.length >= 2) {
      const lx = gp.axes[0];
      const ly = gp.axes[1];
      if (Math.abs(lx) > 0.3) dx += lx;
      if (Math.abs(ly) > 0.3) dy += ly;
    }
    if (gp.buttons && gp.buttons.length > 15) {
      if (gp.buttons[12] && gp.buttons[12].pressed) dy -= 1;
      if (gp.buttons[13] && gp.buttons[13].pressed) dy += 1;
      if (gp.buttons[14] && gp.buttons[14].pressed) dx -= 1;
      if (gp.buttons[15] && gp.buttons[15].pressed) dx += 1;
    }
  }

  // cosmetic facing bias: remember the last horizontal input direction so
  // the sprite can face the way the player is moving. Does not affect
  // movement, speed, or collision -- draw only.
  if (dx < 0) player.facing = -1;
  else if (dx > 0) player.facing = 1;

  if (dx !== 0 || dy !== 0) {
    const len = Math.hypot(dx, dy);
    const nx = player.x + (dx / len) * PLAYER_SPEED * dtSec;
    const ny = player.y + (dy / len) * PLAYER_SPEED * dtSec;

    // Resolve each axis independently against obstacles so sliding along a
    // wall works instead of fully blocking diagonal movement.
    const blockedX = level.obstacles.some(o => circleRectCollide(nx, player.y, PLAYER_RADIUS, o));
    const blockedY = level.obstacles.some(o => circleRectCollide(player.x, ny, PLAYER_RADIUS, o));
    if (!blockedX) player.x = nx;
    if (!blockedY) player.y = ny;
    player.x = Math.max(PLAYER_RADIUS, Math.min(level.fieldW - PLAYER_RADIUS, player.x));
    player.y = Math.max(PLAYER_RADIUS, Math.min(level.fieldH - PLAYER_RADIUS, player.y));
  }

  // Cinder Cache pickup: touching one removes it (it never reappears this
  // attempt) and, if the player isn't already holding a charge, grants one
  // stored Cinder Charge -- a single future-use "spend to skip the cooldown"
  // resource, not an immediate effect. The burst/HUD feedback fires whenever
  // a cache is touched, even on the (currently unreachable, since level 7
  // only places one) case where a charge is already held.
  for (let i = caches.length - 1; i >= 0; i--) {
    if (dist(player, caches[i]) < PLAYER_RADIUS + CACHE_RADIUS) {
      cacheBursts.push({ x: caches[i].x, y: caches[i].y, at: elapsedMs });
      lastCachePickupAt = elapsedMs;
      caches.splice(i, 1);
      if (!hasCinderCharge) hasCinderCharge = true;
    }
  }
  cacheBursts = cacheBursts.filter(b => elapsedMs - b.at < CACHE_BURST_MS);

  const spaceIsDown = keys.has(" ");
  if (spaceIsDown && !spaceWasDown) {
    tryDropEmber();
  }
  spaceWasDown = spaceIsDown;
}

function tryDropEmber() {
  if (emberDroppedThisFrame) return;
  const cooldownReady = elapsedMs - lastEmberDropAt >= level.emberCooldownMs;
  if (cooldownReady) {
    // Normal drop: the stored charge, if any, is left untouched.
    lastEmberDropAt = elapsedMs;
    embers.push({ x: player.x, y: player.y, droppedAt: elapsedMs });
    emberDroppedThisFrame = true;
    if (typeof playEmberTick === "function") playEmberTick();
  } else if (hasCinderCharge) {
    // Spend the stored charge to drop immediately, mid-cooldown.
    // Do NOT change lastEmberDropAt, do NOT restart, extend, or reset the normal cooldown.
    hasCinderCharge = false;
    lastChargeSpentAt = elapsedMs;
    embers.push({ x: player.x, y: player.y, droppedAt: elapsedMs, fromCharge: true });
    emberDroppedThisFrame = true;
    if (typeof playEmberTick === "function") playEmberTick();
  }
}

// Beast AI -- deliberately the simplest possible rule set:
//   1. the newest still-hot ember is the target, if one exists
//   2. otherwise the beast heads for the player's own torch (their
//      continuous "light event"), since the player is never truly dark
//   3. a short idle/patrol grace period only applies before anything has
//      ever been lit
function updateBeast(dtSec) {
  const hotEmbers = embers.filter(e => elapsedMs - e.droppedAt < level.emberLifetimeMs);

  if (hotEmbers.length > 0) {
    const newest = hotEmbers[hotEmbers.length - 1];
    beast.state = "chase-ember";
    moveToward(beast, newest, level.beastSpeed, dtSec);
  } else if (elapsedMs < BEAST_IDLE_SECONDS * 1000 && embers.length === 0) {
    beast.state = "idle";
    moveToward(beast, beast.patrolTarget, BEAST_PATROL_SPEED, dtSec);
  } else {
    beast.state = "chase-torch";
    moveToward(beast, player, level.beastSpeed, dtSec);
  }
}

function checkWinLose() {
  if (dist(player, level.safeZone) < level.safeZone.r + PLAYER_RADIUS) {
    if (!gameOver && typeof playWinStinger === "function") playWinStinger();
    gameOver = "won";
    overlayMsgEl.style.color = "#8fe38f";
    overlayMsgEl.textContent = levelIndex < LEVELS.length - 1
      ? "YOU REACHED SAFETY — press N for the next level"
      : `ALL ${LEVELS.length} LEVELS CLEAR — press Shift+R to start over`;
  } else if (dist(player, beast) < PLAYER_RADIUS + BEAST_RADIUS) {
    if (!gameOver && typeof playLossStinger === "function") playLossStinger();
    gameOver = "lost";
    overlayMsgEl.style.color = "#e37d7d";
    overlayMsgEl.textContent = "THE BEAST CAUGHT YOU — press R to restart";
  }
}

// ---- draw -------------------------------------------------------
// CANVAS-DRAWN BLOCKY PIXEL-ART EXPERIMENT PASS. This is a rendering/style
// test only: every figure below is hand-drawn from a chunky grid of
// fillRect blocks (no external assets) and walls are painted as brick
// masonry. It is a blocky, canvas-drawn pixel-art LOOK -- NOT a guaranteed
// device-pixel-perfect render. The canvas is CSS-scaled to fit the viewport
// (see the #game rule above), so on the larger levels the browser resamples
// these blocks and they are not 1:1 with physical screen pixels.
//
// Provenance: Ian requested this pixel-art direction ("walls like bricks,
// characters as simple figures") AFTER the previous silhouette/glow visual
// pass was rejected. This pass intentionally diverges from that
// silhouette/glow research artifact; it is an experiment, not a ratified
// art direction.
//
// None of the collision-relevant numbers change -- sprites are centered on
// the exact same x/y and sized to sit around the unchanged hit radii, so
// PLAYER_RADIUS / BEAST_RADIUS / safeZone.r still govern all gameplay.

// One shared cosmetic lattice for the whole scene. PX is the size, in
// CANVAS pixels (a block/art unit -- NOT device pixels), of a single art
// "pixel". Bricks, mortar, safe-zone stones and embers are all whole
// multiples of PX so sprites, walls and the goal read as one blocky system.
const PX = 3;                 // canvas pixels per art block
const BRICK_W = PX * 10;      // 30 -- coarse bricks stay legible when downscaled
const BRICK_H = PX * 5;       // 15
const BRICK_M = PX;           // 3 -- mortar gap (thicker than before to survive CSS scaling)
const STONE_CELL = PX * 2;    // 6 -- safe-zone stones share the lattice

// Player: a small upright torch-bearer -- warm, compact, clearly a person.
const PLAYER_SPRITE = [
  "..fff..",
  ".offfo.",
  ".obbbo.",
  "obbbbbe",
  ".obbbo.",
  ".obbbo.",
  "..o.o..",
  "..k.k..",
];
const PLAYER_PAL = {
  o: "#3a2416", // dark warm outline
  f: "#e8d27a", // face/hood -- keeps the original player hue
  b: "#c98a3a", // cloak body (warm amber)
  k: "#5a3d22", // legs
  e: "#ff9a3c", // ember carried at the hand
};

// Beast: a low, wide four-legged hound -- reads as predator, not person.
const BEAST_SPRITE = [
  "......r..",
  "..rrrrrrr",
  ".rrrrrrry",
  "rrrrrrrrr",
  ".rrrrrrr.",
  ".d.d.d.d.",
];
const BEAST_PAL = {
  r: "#b23a3a", // body -- keeps the original beast hue
  d: "#5a1a1a", // legs / dark underside
  y: "#ffd24a", // single bright eye (hunting your fire)
};

// Ember: a small blocky flame left burning on the ground -- an upright
// tongue of fire with a hot pale core over cooled base embers, so it reads
// as dropped fire/bait, not a collectible pickup.
const EMBER_SPRITE = [
  "..f..",
  ".fcf.",
  ".fcf.",
  "fcccf",
  "fcccf",
  ".fbf.",
];
const EMBER_PAL = {
  f: "#ff7a1e", // outer flame (warm orange)
  c: "#ffe6a0", // hot pale core
  b: "#8f2c12", // cooled base embers
};
// Same sprite, one swapped core color -- a tiny, cheap tell for an ember
// dropped by spending a Cinder Charge, so it's distinguishable at a glance
// without a new silhouette or animation.
const EMBER_CHARGE_PAL = Object.assign({}, EMBER_PAL, { c: "#fff6d0" });

// Cinder Cache: a small compact spark cluster, deliberately shaped and
// colored to avoid reading as either a dropped ember (tall flame tongue,
// orange/pale-yellow) or the safe zone (large grey stone ring). A wide
// diamond silhouette with a near-white pulsing core -- a positive pickup,
// not bait left on the ground.
const CACHE_SPRITE = [
  "...k...",
  "..kck..",
  ".kcwck.",
  "kcwwwck",
  ".kcwck.",
  "..kck..",
  "...k...",
];
const CACHE_PAL = {
  k: "#5a2a10", // dark warm outline
  c: "#ff9a3c", // amber body
  w: "#fff6d0", // near-white pulsing core
};

// Brick masonry palette -- deliberately low-contrast (mortar and the two
// brick tones sit close in luminance) so the texture stays calm and does
// not shimmer when the big levels are CSS-downscaled.
const BRICK_MORTAR = "#2b2419";
const BRICK_A = "#4c4133";
const BRICK_B = "#463c2f";

// Paint a pixel-grid sprite centered on (cx, cy), each art pixel PX canvas
// pixels square. Origin snaps to whole canvas pixels so the blocks stay
// crisp. `flip` mirrors the sprite horizontally -- a cosmetic-only facing
// change; it never touches position, hit radius, or any gameplay state.
function drawSprite(grid, palette, cx, cy, flip) {
  const rows = grid.length, cols = grid[0].length;
  const ox = Math.round(cx - (cols * PX) / 2);
  const oy = Math.round(cy - (rows * PX) / 2);
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const sc = flip ? cols - 1 - c : c; // read mirrored column when facing left
      const color = palette[grid[r][sc]];
      if (!color) continue;
      ctx.fillStyle = color;
      ctx.fillRect(ox + c * PX, oy + r * PX, PX, PX);
    }
  }
}

// Fill an obstacle rectangle with running-bond brick masonry, clipped so
// the wall's collision edges stay exactly where the rect defines them.
function drawBricks(o) {
  ctx.save();
  ctx.beginPath();
  ctx.rect(o.x, o.y, o.w, o.h);
  ctx.clip();
  ctx.fillStyle = BRICK_MORTAR;
  ctx.fillRect(o.x, o.y, o.w, o.h);
  // Running-bond courses on the shared PX lattice. Only the course (row)
  // alternates tone -- calmer and lower-detail than a per-brick
  // checkerboard, which turns into busy noise once the field is scaled down.
  let row = 0;
  for (let y = o.y; y < o.y + o.h; y += BRICK_H + BRICK_M) {
    const offset = (row % 2) ? -(BRICK_W / 2 + BRICK_M / 2) : 0; // half-brick stagger
    ctx.fillStyle = (row % 2) ? BRICK_A : BRICK_B;
    for (let x = o.x + offset; x < o.x + o.w; x += BRICK_W + BRICK_M) {
      ctx.fillRect(x + BRICK_M, y, BRICK_W - BRICK_M, BRICK_H);
    }
    row++;
  }
  ctx.restore();
}

// Safe zone rendered as a pixelated stone ring -- same center/radius, so
// it reads (and collides) identically to the old flat circle.
function drawStoneCircle() {
  const { x, y, r } = level.safeZone;
  const cell = STONE_CELL;
  // Scan a grid snapped to the shared PX lattice over the circle's bounding
  // box and keep each cell whose center falls inside the radius. This is
  // robust for ANY radius (no dependence on r being an even multiple of the
  // cell size) and keeps the ring aligned to the brick/sprite grid.
  const x0 = Math.floor((x - r) / cell) * cell;
  const y0 = Math.floor((y - r) / cell) * cell;
  for (let sy = y0; sy <= y + r; sy += cell) {
    for (let sx = x0; sx <= x + r; sx += cell) {
      const d = Math.hypot(sx + cell / 2 - x, sy + cell / 2 - y);
      if (d > r) continue;
      // checker keyed on integer lattice indices -- never depends on r parity
      const gi = Math.round(sx / cell) + Math.round(sy / cell);
      ctx.fillStyle = d > r - cell * 1.5
        ? "#cfcfae"                            // lighter rim -- reads as the goal
        : ((gi & 1) ? "#8a8a78" : "#787866");  // stone body
      ctx.fillRect(sx, sy, cell, cell);
    }
  }
}

function drawWorld() {
  ctx.fillStyle = "#0e1a10";
  ctx.fillRect(0, 0, level.fieldW, level.fieldH);

  // walls as brick masonry
  for (const o of level.obstacles) drawBricks(o);

  // safe zone (pixel stone circle)
  drawStoneCircle();

  // cinder caches (small pulsing pickup; only present where level data
  // lists them). The pulse is a legibility aid so it reads as "alive"
  // against a static dropped ember, not a hitpoint/timer of any kind.
  for (const c of caches) {
    const pulse = 0.7 + 0.3 * Math.sin(elapsedMs / 220);
    const glowR = PX * 7;
    const glow = ctx.createRadialGradient(c.x, c.y, 0, c.x, c.y, glowR);
    glow.addColorStop(0, `rgba(255,240,190,${0.55 * pulse})`);
    glow.addColorStop(1, "rgba(255,240,190,0)");
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(c.x, c.y, glowR, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = pulse;
    drawSprite(CACHE_SPRITE, CACHE_PAL, c.x, c.y, false);
    ctx.globalAlpha = 1;
  }

  // Cinder Cache pickup feedback: a brief expanding, fading glow-pop at the
  // pickup point. Purely cosmetic and self-clearing (CACHE_BURST_MS) --
  // fires even if the ember cooldown was already expired, so the pickup
  // still visibly registers.
  for (const b of cacheBursts) {
    const t = (elapsedMs - b.at) / CACHE_BURST_MS; // 0 -> 1
    if (t >= 1) continue;
    const r = PX * 4 + t * PX * 14;
    ctx.globalAlpha = 1 - t;
    ctx.strokeStyle = "#fff6d0";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(b.x, b.y, r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // embers (blocky flames on the ground, fade after they go cold)
  for (const e of embers) {
    const age = elapsedMs - e.droppedAt;
    const alpha = Math.max(0, 1 - Math.max(0, age - level.emberLifetimeMs) / EMBER_FADE_MS);
    if (alpha <= 0) continue;
    ctx.globalAlpha = alpha;
    // subtle cosmetic halo so a dropped ember reads as fire/bait, not a
    // pickup pip. Purely visual and much smaller than the real ember light
    // radius -- the actual light hole lives in drawFog and is untouched.
    const glowR = PX * 8;
    const glow = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, glowR);
    glow.addColorStop(0, "rgba(255,150,60,0.5)");
    glow.addColorStop(1, "rgba(255,150,60,0)");
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(e.x, e.y, glowR, 0, Math.PI * 2);
    ctx.fill();
    drawSprite(EMBER_SPRITE, e.fromCharge ? EMBER_CHARGE_PAL : EMBER_PAL, e.x, e.y);
    ctx.globalAlpha = 1;
  }

  // beast (low four-legged pixel figure) -- cosmetically oriented toward
  // whatever it is currently making for. This just re-reads the same target
  // the AI already chose this frame (read-only); it changes no movement.
  let bt;
  const hotEmbers = embers.filter(e => elapsedMs - e.droppedAt < level.emberLifetimeMs);
  if (hotEmbers.length > 0) bt = hotEmbers[hotEmbers.length - 1];
  else if (beast.state === "idle") bt = beast.patrolTarget;
  else bt = player;
  drawSprite(BEAST_SPRITE, BEAST_PAL, beast.x, beast.y, bt.x < beast.x);

  // player (upright pixel torch-bearer) -- biased toward last movement
  // direction (player.facing), a cosmetic flip only.
  drawSprite(PLAYER_SPRITE, PLAYER_PAL, player.x, player.y, player.facing < 0);
}

// Punch light holes into an opaque fog layer -- this is the entire
// "lighting engine": everything not under a light radius is simply never
// revealed, including the beast.
function drawFog() {
  fogCtx.globalCompositeOperation = "source-over";
  fogCtx.fillStyle = "#000";
  fogCtx.fillRect(0, 0, level.fieldW, level.fieldH);
  fogCtx.globalCompositeOperation = "destination-out";

  function punchHole(x, y, r) {
    const grad = fogCtx.createRadialGradient(x, y, 0, x, y, r);
    grad.addColorStop(0, "rgba(0,0,0,1)");
    grad.addColorStop(0.75, "rgba(0,0,0,0.9)");
    grad.addColorStop(1, "rgba(0,0,0,0)");
    fogCtx.fillStyle = grad;
    fogCtx.beginPath();
    fogCtx.arc(x, y, r, 0, Math.PI * 2);
    fogCtx.fill();
  }

  punchHole(player.x, player.y, TORCH_RADIUS);
  for (const e of embers) {
    const age = elapsedMs - e.droppedAt;
    const t = Math.max(0, 1 - age / level.emberLifetimeMs);
    const r = EMBER_RADIUS * (0.35 + 0.65 * t); // shrinks as it cools
    if (t > 0 || age - level.emberLifetimeMs < EMBER_FADE_MS) {
      punchHole(e.x, e.y, Math.max(20, r));
    }
  }

  fogCtx.globalCompositeOperation = "source-over";
  ctx.drawImage(fogCanvas, 0, 0);
}

function drawDebug() {
  if (!debugView) return;
  ctx.save();
  ctx.strokeStyle = "rgba(255,255,255,0.35)";
  ctx.setLineDash([4, 4]);

  ctx.beginPath();
  ctx.arc(player.x, player.y, TORCH_RADIUS, 0, Math.PI * 2);
  ctx.stroke();

  for (const e of embers) {
    ctx.beginPath();
    ctx.arc(e.x, e.y, EMBER_RADIUS, 0, Math.PI * 2);
    ctx.stroke();
  }

  ctx.strokeStyle = "rgba(255,240,190,0.8)";
  for (const c of caches) {
    ctx.beginPath();
    ctx.arc(c.x, c.y, CACHE_RADIUS, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.strokeStyle = "rgba(255,255,255,0.35)";

  ctx.beginPath();
  ctx.arc(beast.x, beast.y, BEAST_RADIUS + 4, 0, Math.PI * 2);
  ctx.strokeStyle = "rgba(255,220,0,0.8)";
  ctx.stroke();

  // beast target crosshair
  let targetPt = null;
  const hotEmbers = embers.filter(e => elapsedMs - e.droppedAt < level.emberLifetimeMs);
  if (hotEmbers.length > 0) targetPt = hotEmbers[hotEmbers.length - 1];
  else if (beast.state !== "idle") targetPt = player;
  if (targetPt) {
    ctx.setLineDash([]);
    ctx.strokeStyle = "rgba(255,220,0,0.8)";
    ctx.beginPath();
    ctx.moveTo(beast.x, beast.y);
    ctx.lineTo(targetPt.x, targetPt.y);
    ctx.stroke();
  }

  ctx.setLineDash([]);
  ctx.fillStyle = "#ffdd66";
  ctx.font = "13px monospace";
  ctx.fillText(`beast: ${beast.state}`, beast.x + 16, beast.y - 16);
  ctx.fillText(`player`, player.x + 12, player.y - 12);
  ctx.restore();
}

function updateGamepadInput(gp) {
  if (gp && gp.buttons) {
    if (typeof initAudio === "function") {
      for (let i = 0; i < gp.buttons.length; i++) {
        if (gp.buttons[i] && gp.buttons[i].pressed) {
          initAudio();
          break;
        }
      }
    }
    // Check restart button (Button 9)
    if (gp.buttons.length > 9 && gp.buttons[9]) {
      const button9Down = gp.buttons[9].pressed;
      if (button9Down && !gpButton9WasDown) {
        resetGame();
      }
      gpButton9WasDown = button9Down;
    }

    // Check ember button (Button 0)
    if (gp.buttons.length > 0 && gp.buttons[0]) {
      const button0Down = gp.buttons[0].pressed;
      if (button0Down && !gpButton0WasDown && !gameOver) {
        tryDropEmber();
      }
      gpButton0WasDown = button0Down;
    }
  } else {
    gpButton0WasDown = false;
    gpButton9WasDown = false;
  }
}

// ---- main loop -------------------------------------------------------
let lastTs = performance.now();
function frame(ts) {
  const dtSec = Math.min(0.05, (ts - lastTs) / 1000);
  lastTs = ts;

  emberDroppedThisFrame = false;

  const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
  let gp = null;
  for (let i = 0; i < gamepads.length; i++) {
    if (gamepads[i]) {
      gp = gamepads[i];
      break;
    }
  }

  updateGamepadInput(gp);

  if (!gameOver) {
    elapsedMs += dtSec * 1000;
    updatePlayer(dtSec, gp);
    updateBeast(dtSec);
    checkWinLose();
    if (typeof updateProximityAudio === "function") {
      updateProximityAudio(dist(player, beast));
    }
  } else {
    if (typeof updateProximityAudio === "function") {
      updateProximityAudio(Infinity);
    }
  }

  drawWorld();
  drawFog();
  drawDebug();

  const cooldownLeft = Math.max(0, level.emberCooldownMs - (elapsedMs - lastEmberDropAt));
  emberStatusEl.textContent = cooldownLeft > 0
    ? `ember: cooling (${(cooldownLeft / 1000).toFixed(1)}s)`
    : "ember: ready";
  if (elapsedMs - lastCachePickupAt < CACHE_PICKUP_MSG_MS) {
    cacheStatusEl.textContent = "cinder charge ready";
  } else if (elapsedMs - lastChargeSpentAt < CACHE_SPENT_MSG_MS) {
    cacheStatusEl.textContent = "cinder charge spent";
  } else if (hasCinderCharge) {
    cacheStatusEl.textContent = "cinder charge: held";
  } else {
    cacheStatusEl.textContent = "";
  }

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
